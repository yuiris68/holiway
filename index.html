<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="哈樂維">
<title>哈樂維運動倉庫 課程管理系統</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --pink:#D4537E;--pink-lt:#FBEAF0;--pink-dk:#4B1528;
  --green:#639922;--green-lt:#EAF3DE;
  --amber:#BA7517;--amber-lt:#FAEEDA;
  --blue:#378ADD;--blue-lt:#E6F1FB;
  --red:#E24B4A;--red-lt:#FCEBEB;
  --purple:#7F77DD;--purple-lt:#EEEDFE;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--color-bg,#f5f5f5);color:#1a1a1a;min-height:100vh}

/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#FBEAF0 0%,#E6F1FB 100%)}
.login-box{background:#fff;border-radius:16px;padding:36px 32px;width:100%;max-width:380px;box-shadow:0 4px 24px rgba(0,0,0,0.08)}
.login-logo{text-align:center;margin-bottom:24px}
.login-logo h1{font-size:20px;font-weight:600;color:var(--pink)}
.login-logo p{font-size:13px;color:#888;margin-top:4px}
.login-field{margin-bottom:14px}
.login-field label{font-size:12px;color:#666;display:block;margin-bottom:4px}
.login-field input{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;outline:none;transition:border .15s}
.login-field input:focus{border-color:var(--pink)}
.login-btn{width:100%;padding:12px;background:var(--pink);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:500;cursor:pointer;margin-top:6px}
.login-btn:disabled{opacity:.6;cursor:not-allowed}
.login-err{color:var(--red);font-size:12px;text-align:center;margin-top:8px;min-height:18px}

/* APP */
#app-screen{display:none}
.top-bar{background:#fff;border-bottom:0.5px solid #e0e0e0;padding:8px 12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;position:sticky;top:0;z-index:100}
.logo{font-size:14px;font-weight:600}.logo span{color:var(--pink)}
.logo-sub{font-size:10px;color:#999;display:block}
.db-badge{font-size:11px;padding:2px 8px;border-radius:10px;border:0.5px solid #C0DD97;background:#EAF3DE;color:#27500A}
.sync-badge{font-size:11px;color:#999;min-width:60px}
.nav{display:flex;gap:3px;flex-wrap:wrap}
.nb{padding:4px 10px;border-radius:20px;border:0.5px solid #ddd;background:transparent;cursor:pointer;font-size:11px;color:#666}
.nb.active{background:var(--pink);color:#fff;border-color:var(--pink)}
.nb:hover:not(.active){background:#f5f5f5}
.user-area{margin-left:auto;display:flex;align-items:center;gap:8px}
.logout-btn{padding:4px 10px;border-radius:8px;border:0.5px solid #ddd;background:transparent;cursor:pointer;font-size:11px;color:#666}

.main{padding:12px;max-width:1100px;margin:0 auto}
.panel{display:none}.panel.active{display:block}
.sh{display:flex;align-items:center;gap:8px;margin-bottom:11px;flex-wrap:wrap}
.sh h2{font-size:14px;font-weight:500}
.empty{font-size:12px;color:#999;text-align:center;padding:20px 0}
.card{background:#fff;border:0.5px solid #e0e0e0;border-radius:12px;padding:11px 13px;margin-bottom:7px}

/* loading overlay */
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:12px}
.spinner{width:36px;height:36px;border:3px solid #eee;border-top-color:var(--pink);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:#666}

.badge{display:inline-block;padding:2px 7px;border-radius:8px;font-size:10px;font-weight:500}
.badge.adv{background:#C0DD97;color:#27500A}.badge.snake{background:#B5D4F4;color:#0C447C}
.badge.multi{background:#FAC775;color:#412402}.badge.yoyo{background:#F4C0D1;color:#4B1528}
.badge.halou{background:#CECBF6;color:#26215C}
.pill{font-size:11px;padding:2px 8px;border-radius:8px}
.pill-green{background:#EAF3DE;color:#27500A}.pill-amber{background:#FAEEDA;color:#412402}
.pill-red{background:#FCEBEB;color:#501313}.pill-blue{background:#E6F1FB;color:#0C447C}
.pill-purple{background:#EEEDFE;color:#3C3489}.pill-gray{background:#f5f5f5;color:#666}
.av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0}
.av-pink{background:#FBEAF0;color:#4B1528}
.metrics{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:12px}
.mc{background:#f8f8f8;border-radius:8px;padding:10px 12px}
.mc-lbl{font-size:11px;color:#999;margin-bottom:2px}
.mc-val{font-size:20px;font-weight:500}
input,select,textarea{border-radius:8px;border:0.5px solid #ddd;padding:5px 8px;font-size:12px;background:#fff;color:#1a1a1a;width:100%}
input[type=checkbox]{width:auto}
label{font-size:11px;color:#666;display:block;margin-bottom:2px}
.fr{margin-bottom:8px}.fg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.btn{padding:5px 13px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:500}
.btn-pink{background:var(--pink);color:#fff}.btn-green{background:#639922;color:#fff}
.btn-blue{background:#378ADD;color:#fff}
.btn-outline{background:transparent;border:0.5px solid #ddd;color:#666}
.btn-outline:hover{background:#f5f5f5}
.btn-red{background:transparent;border:0.5px solid #F09595;color:#A32D2D}
.chip{padding:3px 10px;border-radius:10px;border:0.5px solid #e0e0e0;font-size:11px;cursor:pointer;background:transparent;color:#666}
.chip.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.pbar-wrap{height:5px;background:#e0e0e0;border-radius:3px;margin:4px 0;overflow:hidden}
.pbar{height:100%;border-radius:3px}
.srow{display:flex;align-items:center;gap:7px;padding:6px 9px;border-radius:8px;border:0.5px solid #e0e0e0;margin-bottom:5px}
.srow.present{background:#EAF3DE;border-color:#C0DD97}
.srow.absent{background:#FAEEDA;border-color:#FAC775}
.srow.leave{background:#E6F1FB;border-color:#B5D4F4}
.sb{padding:2px 7px;border-radius:7px;border:0.5px solid #e0e0e0;font-size:11px;cursor:pointer;background:transparent;color:#666}
.sb.sp{background:#639922;color:#fff;border-color:#639922}
.sb.sa{background:#BA7517;color:#fff;border-color:#BA7517}
.sb.sl{background:#378ADD;color:#fff;border-color:#378ADD}
.rbox{background:#f8f8f8;border-radius:8px;padding:10px;font-size:12px;margin-bottom:8px}
.rrow{display:flex;justify-content:space-between;padding:3px 0}
.rtotal{font-weight:500;border-top:0.5px solid #e0e0e0;margin-top:5px;padding-top:6px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.42);display:flex;align-items:center;justify-content:center;z-index:200;padding:12px}
.modal{background:#fff;border-radius:12px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
.mhead{padding:12px 15px;border-bottom:0.5px solid #e0e0e0;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff}
.mhead h3{font-size:14px;font-weight:500}
.mbody{padding:13px 15px}
.xbtn{background:transparent;border:none;cursor:pointer;color:#999;font-size:16px}
.info-box{background:#f8f8f8;border-radius:8px;padding:9px 11px;font-size:11px;color:#666;line-height:1.7;margin-bottom:9px}
.enroll-chip{font-size:11px;padding:2px 8px;border-radius:7px;font-weight:500}
.ec-enrolled{background:#EAF3DE;color:#27500A}.ec-wait{background:#FAEEDA;color:#412402}
.ec-full{background:#FCEBEB;color:#501313}
.cap-bar-wrap{flex:1;height:6px;background:#e0e0e0;border-radius:3px;overflow:hidden;min-width:40px}
.cap-bar{height:100%;border-radius:3px}
.fee-tag{display:inline-flex;align-items:center;font-size:11px;font-weight:500;padding:2px 8px;border-radius:8px;background:#EAF3DE;color:#27500A;border:0.5px solid #C0DD97}
.section-div{font-size:11px;font-weight:500;color:#888;margin:10px 0 5px;padding-bottom:3px;border-bottom:0.5px solid #e0e0e0}
.tbl{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
.tbl th{text-align:left;font-weight:500;padding:6px 9px;border-bottom:0.5px solid #e0e0e0;color:#888;font-size:11px}
.tbl td{padding:6px 9px;border-bottom:0.5px solid #e0e0e0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tbl tr:last-child td{border-bottom:none}
.fee-subtab{display:flex;gap:5px;margin-bottom:12px;border-bottom:0.5px solid #e0e0e0;padding-bottom:8px}
.fee-subtab button{padding:4px 12px;border-radius:8px;border:0.5px solid #e0e0e0;background:transparent;cursor:pointer;font-size:12px;color:#666}
.fee-subtab button.active{background:var(--pink);color:#fff;border-color:var(--pink)}
.qr-box{background:#f8f8f8;border-radius:12px;padding:12px;margin-bottom:10px}
.qr-grid{display:grid;grid-template-columns:auto 1fr;gap:12px;align-items:start}

/* ── Substitute Coach ── */
.sub-active-badge{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:3px 10px;border-radius:8px;background:#FAEEDA;color:#412402;border:0.5px solid #FAC775;margin-left:8px}
/* ── New Feature Styles ── */
.holiday-tag{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:2px 7px;border-radius:7px;background:#FAEEDA;color:#412402;border:0.5px solid #FAC775;margin:2px}
.session-date-chip{font-size:10px;color:#378ADD;background:#E6F1FB;border-radius:6px;padding:2px 6px;display:inline-block;margin-bottom:3px}
.manual-bar{display:flex;align-items:center;gap:8px;padding:8px 10px;background:#f8f8f8;border-radius:8px;margin-bottom:8px;flex-wrap:wrap}
.si-check{width:18px;height:18px;accent-color:#639922;cursor:pointer;flex-shrink:0}
.att-table{width:100%;border-collapse:collapse;font-size:11px}
.att-table th{background:#f8f8f8;padding:5px 7px;text-align:center;border:0.5px solid #e0e0e0;font-weight:500;font-size:10px}
.att-table td{padding:5px 7px;border:0.5px solid #e0e0e0;text-align:center;vertical-align:middle}
.att-table tr:nth-child(even) td{background:#fafafa}
.att-dot{width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;cursor:pointer;border:none;transition:all .15s}
.att-dot.present{background:#EAF3DE;color:#27500A}
.att-dot.leave{background:#E6F1FB;color:#0C447C}
.att-dot.absent{background:#FAEEDA;color:#412402}
.att-dot.empty{background:#f0f0f0;color:#bbb}
.pf-wrap{max-width:480px;margin:0 auto}
.pf-header{text-align:center;padding:20px 0 14px}
.pf-logo{font-size:18px;font-weight:600;color:var(--pink)}
.pf-sec{background:#fff;border:0.5px solid #e0e0e0;border-radius:12px;padding:14px;margin-bottom:10px}
.pf-sec-title{font-size:13px;font-weight:500;margin-bottom:10px}
.pf-field{margin-bottom:10px}
.pf-field label{font-size:12px;color:#666;margin-bottom:3px;display:block}
.pf-field input,.pf-field select{font-size:14px;padding:9px 11px;border-radius:8px}
.pf-field-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pf-submit{width:100%;padding:12px;background:var(--pink);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;margin-top:4px}
.pending-card{background:#fff;border:0.5px solid #e0e0e0;border-radius:12px;padding:12px 13px;margin-bottom:8px;border-left:3px solid var(--amber)}


/* ── Reports & Coach Manager ── */
.report-card{background:#fff;border:0.5px solid #e0e0e0;border-radius:12px;padding:14px;margin-bottom:12px}
.report-filter{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;margin-bottom:12px;padding:10px 12px;background:#f8f8f8;border-radius:8px}
.report-filter .fr{margin-bottom:0;min-width:120px}
.report-stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-bottom:12px}
.report-stat{background:#f8f8f8;border-radius:8px;padding:10px 12px;text-align:center}
.report-stat-val{font-size:22px;font-weight:600;margin-bottom:2px}
.report-stat-lbl{font-size:11px;color:#999}
.coach-card{background:#fff;border:0.5px solid #e0e0e0;border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.coach-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:600;flex-shrink:0}
.report-table{width:100%;border-collapse:collapse;font-size:12px}
.report-table th{background:#f8f8f8;padding:7px 10px;text-align:left;border-bottom:0.5px solid #e0e0e0;font-weight:500;color:#666;font-size:11px;white-space:nowrap}
.report-table td{padding:7px 10px;border-bottom:0.5px solid #e0e0e0}
.report-table tr:last-child td{border-bottom:none}
.report-table tr:hover td{background:#fafafa}
.report-table tfoot td{font-weight:600;background:#f0f0f0;border-top:1px solid #e0e0e0}
.tab-row{display:flex;gap:5px;margin-bottom:14px;flex-wrap:wrap}
.tab-btn{padding:5px 14px;border-radius:20px;border:0.5px solid #ddd;background:transparent;cursor:pointer;font-size:12px;color:#666}
.tab-btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.export-btn{margin-left:auto;padding:4px 12px;border-radius:8px;border:0.5px solid #C0DD97;background:#EAF3DE;color:#27500A;cursor:pointer;font-size:11px}

</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <h1>哈樂維運動倉庫</h1>
      <p>課程管理系統</p>
    </div>
    <div class="login-field">
      <label>電子郵件</label>
      <input type="email" id="login-email" placeholder="輸入帳號" autocomplete="username">
    </div>
    <div class="login-field">
      <label>密碼</label>
      <input type="password" id="login-password" placeholder="輸入密碼" autocomplete="current-password">
    </div>
    <button class="login-btn" id="login-btn" onclick="doLogin()">登入</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- LOADING -->
<div class="loading-overlay" id="loading-overlay" style="display:none">
  <div class="spinner"></div>
  <div class="loading-text" id="loading-text">載入中...</div>
</div>

<!-- APP -->
<div id="app-screen">
  <div class="top-bar">
    <div class="logo">哈樂維運動倉庫<span>課程管理</span><span class="logo-sub">Haloway Sports Warehouse</span></div>
    <span class="db-badge" id="db-st">✓ Firebase 連線</span>
    <span class="sync-badge" id="sv"></span>
    <nav class="nav">
      <button class="nb active" onclick="sw('dash',this)">總覽</button>
      <button class="nb" onclick="sw('venues',this)">場地</button>
      <button class="nb" onclick="sw('sessions',this)">課程</button>
      <button class="nb" onclick="sw('terms',this)">期別/報名</button>
      <button class="nb" onclick="sw('signin',this)">QR簽到</button>
      <button class="nb" onclick="sw('makeup',this)">補課</button>
      <button class="nb" onclick="sw('fee',this)">學費</button>
      <button class="nb" onclick="sw('students',this)">學生</button>
      <button class="nb" onclick="sw('coaches',this)" style="background:#E6F1FB;color:#0C447C;border-color:#378ADD">教練</button>
      <button class="nb" onclick="sw('reports',this)" style="background:#EEEDFE;color:#3C3489;border-color:#7F77DD">報表</button>
    </nav>
    <div class="user-area">
      <span id="user-email" style="font-size:11px;color:#999"></span>
      <button class="nb" onclick="sw('reg-qr',this)" style="background:#E1F5EE;color:#085041;border-color:#1D9E75">報名QR</button>
    <button class="logout-btn" onclick="doLogout()">登出</button>
    </div>
  </div>

  <div class="main">
    <div id="panel-dash" class="panel active"><div class="metrics" id="dash-metrics"></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px" id="dash-body"></div></div>
    <div id="panel-venues" class="panel"><div class="sh"><h2>場地管理</h2><button class="btn btn-pink" style="margin-left:auto" onclick="openAddVenue()">+ 新增場地</button></div><div id="venues-body"></div></div>
    <div id="panel-sessions" class="panel">
      <div class="sh"><h2>課程管理</h2><div style="display:flex;gap:4px;flex-wrap:wrap" id="track-tabs"></div><button class="btn btn-pink" style="margin-left:auto" onclick="openAddSession()">+ 新增課程</button></div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px" id="sess-grid"></div>
    </div>
    <div id="panel-terms" class="panel">
      <div class="sh"><h2>期別/報名</h2>
        <select id="term-filter" style="width:auto;font-size:12px" onchange="renderTerms()"><option value="all">全部</option><option value="active">進行中</option><option value="enrolling">報名中</option><option value="upcoming">即將開課</option><option value="ended">已結束</option></select>
        <button class="btn btn-pink" style="margin-left:auto" onclick="openAddTerm()">+ 新增期別</button>
      </div>
      <div id="terms-body"></div>
    </div>
    <div id="panel-signin" class="panel">
      <div class="sh"><h2>QR 簽到</h2>
        <select id="si-term" style="width:auto;font-size:12px" onchange="buildSiSess()"></select>
        <select id="si-sess" style="width:auto;font-size:12px;max-width:240px" onchange="renderSignin()"></select>
        <input type="date" id="si-date" style="width:auto;font-size:12px" onchange="renderSignin()">
      </div>
      <div id="qr-area"></div>
      <!-- Substitute coach selector -->
      <div id="sub-coach-bar" style="background:#FAEEDA;border-radius:10px;padding:10px 12px;margin-bottom:8px;border:0.5px solid #FAC775">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap">
          <span style="font-size:12px;font-weight:500;color:#412402">🔄 今日代課教練設定</span>
          <span id="sub-coach-badge" style="display:none;font-size:11px;padding:2px 10px;border-radius:8px;background:#BA7517;color:#fff;font-weight:500"></span>
          <span style="font-size:10px;color:#666;margin-left:auto">設定後，今日出席人次歸入代課教練，不計原教練</span>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end">
          <div style="flex:1;min-width:160px">
            <label style="font-size:10px;color:#666;margin-bottom:2px;display:block">從教練名單選擇</label>
            <select id="sub-coach-sel" style="font-size:12px" onchange="onSubCoachSelChange()">
              <option value="">— 無代課 —</option>
            </select>
          </div>
          <div style="flex:1;min-width:160px">
            <label style="font-size:10px;color:#666;margin-bottom:2px;display:block">或輸入臨時/外部代課教練</label>
            <input type="text" id="sub-coach-input" placeholder="輸入姓名" style="font-size:12px" oninput="onSubCoachInputChange()">
          </div>
          <div style="flex-shrink:0">
            <label style="font-size:10px;color:#666;margin-bottom:2px;display:block">代課費（NT$/堂）</label>
            <input type="number" id="sub-coach-fee" placeholder="0" style="font-size:12px;width:100px" min="0" step="100">
          </div>
          <div style="display:flex;gap:5px;flex-shrink:0;align-self:flex-end">
            <button class="btn btn-amber" style="background:#BA7517;color:#fff;font-size:11px;padding:4px 12px" onclick="saveSubCoach()">✓ 確認代課</button>
            <button class="btn btn-outline" style="font-size:11px;padding:4px 9px;border-color:#BA7517;color:#BA7517" onclick="clearSubCoach()">清除</button>
          </div>
        </div>
        <div id="sub-coach-confirmed" style="display:none;margin-top:8px;padding:6px 10px;background:#fff;border-radius:7px;font-size:11px;display:none;align-items:center;gap:10px">

// ── Firestore helpers ────────────────────────────────
async function fsGet(col){const snap=await db.collection(col).get();return snap.docs.map(d=>({id:d.id,...d.data()}));}
async function fsSet(col,id,data){await db.collection(col).doc(id).set(data);}
async function fsDel(col,id){await db.collection(col).doc(id).delete();}
async function fsSave(col,items){
  const batch=db.batch();
  // clear then rewrite (simple approach for small datasets)
  const snap=await db.collection(col).get();
  snap.docs.forEach(d=>batch.delete(d.ref));
  items.forEach(item=>{const ref=db.collection(col).doc(item.id);batch.set(ref,item);});
  await batch.commit();hint('已同步雲端 ✓');
}

// ── Core helpers ─────────────────────────────────────
function today(){return new Date().toISOString().slice(0,10);}
function fmtD(d){return d?d.slice(2).replace(/-/g,'/'):'—';}
function addWeeks(d,n){const dt=new Date(d);dt.setDate(dt.getDate()+n*7);return dt.toISOString().slice(0,10);}
function fmtAge(y,m){if(!y&&!m)return'—';let s='';if(y)s+=y+'Y ';if(m)s+=m+'M';return s.trim();}
function fmt(n){return'NT$'+Math.round(n).toLocaleString();}
function termStatus(t){const td=today();if(td>=t.startDate&&td<=t.endDate)return{label:'進行中',key:'active'};if(td<t.startDate){if(t.enrollStartDate&&td>=t.enrollStartDate&&td<=t.enrollEndDate)return{label:'報名中',key:'enrolling'};if(t.preRegStartDate&&td>=t.preRegStartDate)return{label:'預報名',key:'upcoming'};return{label:'未開放',key:'upcoming'};}return{label:'已結束',key:'ended'};}
function pillCls(k){return{active:'pill-green',enrolling:'pill-purple',upcoming:'pill-blue',ended:'pill-gray'}[k]||'pill-gray';}
function getEnrolled(tId,sId){return enrolls.filter(e=>e.termId===tId&&(!sId||e.sessionId===sId)&&e.status==='enrolled');}
function getWait(tId,sId){return enrolls.filter(e=>e.termId===tId&&(!sId||e.sessionId===sId)&&e.status==='waitlist');}
function getSt(id){return students.find(s=>s.id===id)||{name:'?'};}
function getSess(id){return sessions.find(s=>s.id===id);}
function getVenue(id){return venues.find(v=>v.id===id);}
function termProgress(t){const s=new Date(t.startDate),e=new Date(t.endDate),n=new Date(today());if(n<s)return 0;if(n>e)return 100;return Math.round((n-s)/(e-s)*100);}
function sessEnrolledTotal(sid){return terms.reduce((a,t)=>a+getEnrolled(t.id,sid).length,0);}
function getSessPrice(sid){const p=pricing.find(x=>x.sessId===sid);return p?p.price:null;}
function feeStatus(f){
  if(f.status==='refunded')return{cls:'pill-gray',label:'已退費',paid:0,net:f.amount,bal:0,pct:100,refunded:true};
  const paid=txns.filter(t=>t.feeId===f.id&&t.type==='pay').reduce((a,b)=>a+b.amount,0);
  const disc=txns.filter(t=>t.feeId===f.id&&t.type==='disc').reduce((a,b)=>a+b.amount,0);
  const net=f.amount-disc,bal=net-paid;
  if(bal<=0)return{cls:'pill-green',label:'已繳清',paid,net,bal:0,pct:100};
  if(paid>0)return{cls:'pill-amber',label:'部分繳',paid,net,bal,pct:Math.round(paid/net*100)};
  if(f.dueDate&&f.dueDate<today())return{cls:'pill-red',label:'逾期',paid,net,bal,pct:0};
  return{cls:'pill-blue',label:'待繳',paid,net,bal,pct:0};
}
function enrollBar(e,c,w=0){const p=Math.min(100,Math.round(e/c*100));const f=e>=c;const bc=f?'var(--red)':p>=80?'var(--amber)':'var(--green)';return`<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap"><div class="cap-bar-wrap"><div class="cap-bar" style="width:${p}%;background:${bc}"></div></div><span class="enroll-chip ${f?'ec-full':'ec-enrolled'}">${e}/${c} 人</span>${w?`<span class="enroll-chip ec-wait">候補 ${w}</span>`:''}</div>`;}

}

  const todaySignins=Object.entries(signinRec).filter(([k])=>k.includes('|'+today())).reduce((a,[,r])=>a+Object.values(r).filter(v=>v==='present').length,0);
  document.getElementById('dash-metrics').innerHTML=`
    <div class="mc"><div class="mc-lbl">進行期別</div><div class="mc-val" style="font-size:13px">${activeTerm?activeTerm.name.replace('2026 ',''):'—'}</div></div>
    <div class="mc"><div class="mc-lbl">在籍學生</div><div class="mc-val">${students.length}</div></div>
    <div class="mc"><div class="mc-lbl">今日簽到</div><div class="mc-val" style="color:#27500A">${todaySignins}</div></div>

function cloneTerm(id){const t=terms.find(x=>x.id===id);if(!t)return;const wks=Math.round((new Date(t.endDate)-new Date(t.startDate))/(7*86400000))+1;const ns=addWeeks(t.endDate,1),ne=addWeeks(ns,wks-1);const gap=t.enrollStartDate?Math.round((new Date(t.startDate)-new Date(t.enrollStartDate))/(7*86400000)):4;renderTermForm(null,{name:t.name.replace(/第(\d+)期/,(_,n)=>`第${+n+1}期`),startDate:ns,endDate:ne,enrollStartDate:addWeeks(ns,-gap),enrollEndDate:addWeeks(ns,-1),preRegStartDate:addWeeks(ns,-gap-4),sessions:[...t.sessions],note:''});}

s="fr"><label>備註</label><input type="text" id="tf-note" value="${d.note||''}"></div><div style="font-size:12px;font-weight:500;margin-bottom:4px">本期班次</div><div style="max-height:200px;overflow-y:auto;border:0.5px solid #e0e0e0;border-radius:8px;padding:4px 8px;margin-bottom:9px">${opts||'<div class="empty">尚無班次</div>'}</div><button class="btn btn-pink" style="width:100%" onclick="${editId?`saveTerm('${editId}')`:'createTerm()'}">${editId?'儲存':'確認新增'}</button>`;tfCalc();document.getElementById('overlay').style.display='flex';}
function tfCalc(){const s=document.getElementById('tf-s').value,e=document.getElementById('tf-e').value;if(s&&e){const w=Math.round((new Date(e)-new Date(s))/(7*86400000));document.getElementById('tf-hint').textContent=`共 ${w} 週`;}}
function getTfData(){return{name:document.getElementById('tf-name').value.trim(),startDate:document.getElementById('tf-s').value,endDate:document.getElementById('tf-e').value,enrollStartDate:document.getElementById('tf-es').value,enrollEndDate:document.getElementById('tf-ee').value,preRegStartDate:document.getElementById('tf-pre').value,sessions:Array.from(document.querySelectorAll('[id^="sc-"]:checked')).map(c=>c.value),note:document.getElementById('tf-note').value};}
async function createTerm(){const d=getTfData();if(!d.name||!d.startDate){alert('請填寫名稱與日期');return;}terms.push({id:'t'+Date.now(),...d,color:VENUE_COLORS[terms.length%VENUE_COLORS.length]});await saveCol('terms',terms);closeMod();renderTerms();renderDash();buildFeTermFilter();}
async function saveTerm(id){const d=getTfData();if(!d.name||!d.startDate){alert('請填寫名稱與日期');return;}const i=terms.findIndex(t=>t.id===id);if(i>=0)terms[i]={...terms[i],...d};await saveCol('terms',terms);closeMod();renderTerms();renderDash();}
async function deleteTerm(id){if(!confirm('確認刪除此期別？'))return;terms=terms.filter(t=>t.id!==id);enrolls=enrolls.filter(e=>e.termId!==id);await saveCol('terms',terms);await saveCol('enrolls',enrolls);renderTerms();renderDash();}
function openTermRoster(termId){const t=terms.find(x=>x.id===termId);if(!t)return;const sl=sessions.filter(s=>t.sessions&&t.sessions.includes(s.id));document.getElementById('mod-title').textContent=t.name+' — 報名名單';document.getElementById('mod-body').innerHTML=sl.map(s=>{const v=getVenue(s.venueId);const cnt=getEnrolled(t.id,s.id).length;const groups=[['enrolled','正取','ec-enrolled'],['waitlist','候補','ec-wait']];return`<div style="margin-bottom:12px"><div style="display:flex;align-items:center;gap:5px;margin-bottom:4px">${v?`<span style="font-size:9px;padding:1px 5px;border-radius:3px;color:#fff;background:${v.color}">${v.shortName}</span>`:''}<span class="badge ${s.type}">${tLabel(s.type)}</span><span style="font-size:12px;font-weight:500;flex:1">${s.name} · ${s.day} ${s.time}</span></div><div style="background:#f8f8f8;border-radius:8px;padding:5px 8px;margin-bottom:5px;font-size:11px;display:flex;align-items:center;gap:8px"><span style="color:#999">報名</span><span style="font-weight:500;color:${cnt>=s.capacity?'#A32D2D':'#27500A'}">${cnt}</span><span style="color:#999">/ 滿班</span><span style="font-weight:500">${s.capacity}</span><span style="color:${cnt>=s.capacity?'#A32D2D':'#27500A'};margin-left:auto">${cnt>=s.capacity?'已滿班':'尚有 '+(s.capacity-cnt)+' 名額'}</span></div>${groups.flatMap(([st,lbl,ec])=>enrolls.filter(e=>e.termId===termId&&e.sessionId===s.id&&e.status===st).map((e,i)=>{const stud=getSt(e.studentId);return`<div style="display:flex;align-items:center;gap:5px;padding:3px 0;border-bottom:0.5px solid #e0e0e0"><span style="font-size:10px;color:#999;min-width:14px">${i+1}</span><span class="enroll-chip ${ec}" style="font-size:10px">${lbl}</span><span style="font-size:12px;flex:1">${stud.name}</span><span style="font-size:10px;color:#999">${fmtAge(stud.ageY,stud.ageM)}</span><button class="btn btn-outline" style="font-size:10px;padding:1px 7px" onclick="openIssueFeePreset('${stud.id}','${termId}','${s.id}')">開帳單</button><button class="btn btn-red" style="font-size:10px;padding:1px 6px" onclick="removeEnroll('${e.id}','${termId}')">移除</button></div>`;})).join('')||'<div style="font-size:11px;color:#999;padding:3px 0">尚無報名</div>'}</div>`;}).join('');document.getElementById('overlay').style.display='flex';}
async function removeEnroll(id,termId){enrolls=enrolls.filter(e=>e.id!==id);await saveCol('enrolls',enrolls);openTermRoster(termId);renderTerms();}
function openAddEnroll(termId){const t=terms.find(x=>x.id===termId);if(!t)return;const so=sessions.filter(s=>t.sessions&&t.sessions.includes(s.id)).sort((a,b)=>(DAY_ORDER[a.day]||9)-(DAY_ORDER[b.day]||9)).map(s=>{const v=getVenue(s.venueId);const cnt=getEnrolled(t.id,s.id).length;const pr=getSessPrice(s.id);return`<option value="${s.id}" data-lessons="${s.periodLessons}" data-price="${pr||''}">${v?'['+v.shortName+'] ':''}${s.day} ${s.time} — ${s.name}（${s.periodLessons}堂${pr!=null?' · '+fmt(pr):''}${cnt>=s.capacity?' ⚠滿':''}）</option>`;}).join('');const stu=students.map(s=>`<option value="${s.id}">${s.name}${s.ageY||s.ageM?' ('+fmtAge(s.ageY,s.ageM)+')':''}</option>`).join('');document.getElementById('mod-title').textContent='新增報名 — '+t.name;document.getElementById('mod-body').innerHTML=`<div class="info-box">${t.name} · 開班：${fmtD(t.startDate)} · 結束：${fmtD(t.endDate)}</div><div class="fr"><label>學生</label>${students.length?`<select id="ae-stu">${stu}</select>`:`<input type="text" id="ae-stuname" placeholder="學生姓名（新生）">`}</div><div class="fr"><label>課程（含學費）</label><select id="ae-sess" onchange="aeInfo()">${so}</select></div><div id="ae-info-box" style="background:#EAF3DE;border-radius:8px;padding:7px 10px;font-size:11px;color:#27500A;margin-bottom:8px"></div><div class="fg"><div class="fr"><label>狀態</label><select id="ae-status"><option value="enrolled">正取</option><option value="waitlist">候補</option><option value="preregister">預報名</option></select></div><div class="fr"><label>報名日期</label><input type="date" id="ae-date" value="${today()}"></div></div><button class="btn btn-pink" style="width:100%" onclick="addEnroll('${termId}')">確認報名</button>`;document.getElementById('overlay').style.display='flex';aeInfo();}
function aeInfo(){const sel=document.getElementById('ae-sess');if(!sel)return;const opt=sel.options[sel.selectedIndex];const lessons=opt?.dataset.lessons;const price=opt?.dataset.price;const el=document.getElementById('ae-info-box');if(el)el.innerHTML=`${lessons?`<span>每期堂數：<strong>${lessons} 堂</strong></span>&nbsp;&nbsp;`:''}${price?`<span>課程學費：<strong>${fmt(parseInt(price))}</strong></span>`:'<span style="color:#999">此課程尚未設定學費</span>'}`;}
async function addEnroll(termId){const sessId=document.getElementById('ae-sess').value;const status=document.getElementById('ae-status').value;let studentId='',studentName='';const se=document.getElementById('ae-stu'),sn=document.getElementById('ae-stuname');if(se)studentId=se.value;else if(sn)studentName=sn.value.trim();if(!studentId&&!studentName){alert('請選擇或輸入學生');return;}const s=getSess(sessId);if(status==='enrolled'&&s){const cnt=getEnrolled(termId,sessId).length;if(cnt>=s.capacity&&!confirm('班次已滿，改為候補？'))return;}enrolls.push({id:'e'+Date.now(),termId,sessionId:sessId,studentId,studentName,status,enrollDate:document.getElementById('ae-date').value,createdAt:today()});await saveCol('enrolls',enrolls);closeMod();renderTerms();renderDash();}

// ── SIGNIN ───────────────────────────────────────────
function buildSiTerms(){const sel=document.getElementById('si-term');sel.innerHTML=[...terms].sort((a,b)=>a.startDate.localeCompare(b.startDate)).map(t=>`<option value="${t.id}" ${termStatus(t).key==='active'?'selected':''}>${t.name}</option>`).join('');buildSiSess();}
function buildSiSess(){const termId=document.getElementById('si-term').value;const t=terms.find(x=>x.id===termId);document.getElementById('si-sess').innerHTML=(t?sessions.filter(s=>t.sessions&&t.sessions.includes(s.id)).sort((a,b)=>(DAY_ORDER[a.day]||9)-(DAY_ORDER[b.day]||9)).map(s=>{const v=getVenue(s.venueId);return`<option value="${s.id}">${v?'['+v.shortName+'] ':''}${s.day} ${s.time} — ${s.name}</option>`;}).join(''):'');renderSignin();}
function renderSignin(){const termId=document.getElementById('si-term').value;const sessId=document.getElementById('si-sess').value;const date=document.getElementById('si-date').value;const s=getSess(sessId);if(!s)return;const key=sessId+'|'+date;const rec=signinRec[key]||{};const co=COACHES[s.coach]||{};const v=getVenue(s.venueId);const enrolled=getEnrolled(termId,sessId);const mkStu=makeupRec.filter(m=>m.makeupSessionId===sessId&&m.makeupDate===date&&m.status==='scheduled');const presentN=Object.values(rec).filter(x=>x==='present').length;const leaveN=Object.values(rec).filter(x=>x==='leave').length;const qrUrl=`https://slide.app/checkin?s=${sessId}&t=${termId}&d=${date}`;document.getElementById('qr-area').innerHTML=`<div class="qr-box"><div style="font-size:12px;font-weight:500;margin-bottom:7px">家長 QR Code 簽到</div><div class="qr-grid"><canvas id="qr-cv" width="96" height="96" style="border-radius:6px;background:#fff;padding:4px;display:block"></canvas><div><div style="font-size:12px;font-weight:500">${s.name}</div><div style="font-size:11px;color:#999">${v?v.name+' · ':''} ${s.day} ${s.time} · ${s.coach} · ${date}</div><div style="display:flex;gap:5px;margin-top:5px"><button class="btn btn-outline" style="font-size:11px;padding:3px 8px" onclick="dlQR()">下載</button><button class="btn btn-outline" style="font-size:11px;padding:3px 8px" onclick="simScan('${termId}','${sessId}','${date}')">模擬掃碼</button></div></div></div></div>`;try{new QRious({element:document.getElementById('qr-cv'),value:qrUrl,size:96,foreground:'#1a1a1a',background:'#ffffff'});}catch(e){}document.getElementById('signin-body').innerHTML=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;padding:8px;background:#f8f8f8;border-radius:8px"><div class="av" style="background:${co.color||'#eee'}20;color:${co.color||'#666'};width:28px;height:28px;font-size:12px">${s.coach[0]}</div><div><div style="font-size:12px;font-weight:500">${s.coach} · ${v?v.name:''}</div><div style="font-size:11px;color:#999">${s.name} · ${date}</div></div><div style="margin-left:auto;display:flex;gap:10px"><div style="text-align:center"><div style="font-size:15px;font-weight:500;color:#27500A">${presentN}</div><div style="font-size:10px">出席</div></div><div style="text-align:center"><div style="font-size:15px;font-weight:500;color:#378ADD">${leaveN}</div><div style="font-size:10px">請假</div></div><div style="text-align:center"><div style="font-size:15px;font-weight:500">${enrolled.length+mkStu.length}</div><div style="font-size:10px">名單</div></div></div></div>${enrolled.map(e=>{const st=getSt(e.studentId)||{name:e.studentName||'?'};const cur=rec[e.studentId]||'';return`<div class="srow ${cur}"><div style="flex:1"><div style="font-size:12px;font-weight:500">${st.name}</div><div style="font-size:10px;color:#999">${fmtAge(st.ageY,st.ageM)}${st.height?' · '+st.height+'cm':''}</div></div><div style="display:flex;gap:3px"><button class="sb ${cur==='present'?'sp':''}" onclick="setSI('${key}','${e.studentId}','present','${termId}','${sessId}')">出席</button><button class="sb ${cur==='leave'?'sl':''}" onclick="setSI('${key}','${e.studentId}','leave','${termId}','${sessId}')">請假</button><button class="sb ${cur==='absent'?'sa':''}" onclick="setSI('${key}','${e.studentId}','absent','${termId}','${sessId}')">缺席</button></div></div>`;}).join('')}${mkStu.map(m=>{const st=getSt(m.studentId);const cur=rec[m.studentId]||'';return`<div class="srow" style="background:#FBEAF0;border-color:#F4C0D1"><div style="font-size:12px;font-weight:500;flex:1">${st.name} <span class="pill pill-purple" style="font-size:10px">補課</span></div><div style="display:flex;gap:3px"><button class="sb ${cur==='present'?'sp':''}" onclick="setMkSI('${key}','${m.studentId}','${m.id}','present')">出席</button><button class="sb ${cur==='absent'?'sa':''}" onclick="setMkSI('${key}','${m.studentId}','${m.id}','absent')">缺席</button></div></div>`;}).join('')}${!enrolled.length&&!mkStu.length?'<div class="empty">此期別班次尚無報名學生</div>':''}`;}
function dlQR(){const c=document.getElementById('qr-cv');if(!c)return;const a=document.createElement('a');a.href=c.toDataURL('image/png');a.download='QR簽到.png';a.click();}
function simScan(termId,sessId,date){const enrolled=getEnrolled(termId,sessId);if(!enrolled.length){alert('此班次尚無學生');return;}const s=getSess(sessId);document.getElementById('mod-title').textContent='家長掃碼簽到';document.getElementById('mod-body').innerHTML=`<div class="info-box">模擬家長掃碼 · ${s?s.name:''} ${date}</div><div class="fr"><label>選擇孩子</label><select id="scan-stu">${enrolled.map(e=>{const st=getSt(e.studentId);return`<option value="${e.studentId}">${st.name}</option>`;}).join('')}</select></div><button class="btn btn-green" style="width:100%" onclick="confirmScan('${sessId}','${date}','${termId}')">確認簽到</button>`;document.getElementById('overlay').style.display='flex';}
async function confirmScan(sessId,date,termId){const stId=document.getElementById('scan-stu').value;const key=sessId+'|'+date;if(!signinRec[key])signinRec[key]={};signinRec[key][stId]='present';const st=students.find(s=>s.id===stId);if(st)st.attended=(st.attended||0)+1;await saveSignin();await saveCol('students',students);document.getElementById('mod-body').innerHTML=`<div style="text-align:center;padding:16px 0"><div style="width:44px;height:44px;border-radius:50%;background:#EAF3DE;display:flex;align-items:center;justify-content:center;margin:0 auto 8px;font-size:22px;color:#639922">✓</div><div style="font-size:15px;font-weight:500;color:#27500A">簽到成功</div></div><button class="btn btn-outline" style="width:100%" onclick="closeMod()">關閉</button>`;renderSignin();renderDash();}
async function setSI(key,stId,status,termId,sessId){if(!signinRec[key])signinRec[key]={};const prev=signinRec[key][stId]||'';signinRec[key][stId]=status;const st=students.find(s=>s.id===stId);if(st){if(prev==='present')st.attended=Math.max(0,(st.attended||0)-1);if(prev==='leave')st.leaves=Math.max(0,(st.leaves||0)-1);if(status==='present')st.attended=(st.attended||0)+1;if(status==='leave'&&(st.leaves||0)<(st.leaveMax||2)){st.leaves=(st.leaves||0)+1;await createMakeup(stId,sessId,termId,key.split('|')[1]);}}await saveSignin();await saveCol('students',students);renderSignin();renderDash();}
async function setMkSI(key,stId,mkId,status){if(!signinRec[key])signinRec[key]={};signinRec[key][stId]=status;if(status==='present'){const m=makeupRec.find(x=>x.id===mkId);if(m){m.status='done';const st=students.find(s=>s.id===stId);if(st)st.makeups=Math.max(0,(st.makeups||0)-1);}}await saveSignin();await saveCol('makeup',makeupRec);await saveCol('students',students);renderSignin();}

// ── MAKEUP ───────────────────────────────────────────
async function createMakeup(studentId,origSessId,termId,leaveDate){makeupRec.push({id:'mk'+Date.now()+Math.random().toString(36).slice(2,5),studentId,originalSessionId:origSessId,termId,leaveDate,makeupSessionId:null,makeupDate:null,status:'pending',createdAt:today()});const st=students.find(s=>s.id===studentId);if(st)st.makeups=(st.makeups||0)+1;await saveCol('makeup',makeupRec);renderMakeup();}
function renderMakeup(){const f=document.getElementById('mk-filter').value;let list=makeupRec;if(f!=='all')list=list.filter(m=>m.status===f);if(!list.length){document.getElementById('makeup-body').innerHTML='<div class="empty">沒有補課記錄</div>';return;}document.getElementById('makeup-body').innerHTML=list.map(m=>{const st=getSt(m.studentId);const orig=getSess(m.originalSessionId);const mkSess=m.makeupSessionId?getSess(m.makeupSessionId):null;const sLabel={pending:'待安排',scheduled:'已排課',done:'已完成'}[m.status];const sCls={pending:'pill-amber',scheduled:'pill-blue',done:'pill-green'}[m.status];const suggested=sessions.filter(s=>{if(s.id===m.originalSessionId)return false;const t=terms.find(x=>x.id===m.termId);const cnt=t?getEnrolled(t.id,s.id).length:0;return s.type===(orig?orig.type:'')&&cnt<s.capacity;}).slice(0,3);return`<div class="card" style="border-left:3px solid ${m.status==='pending'?'var(--amber)':m.status==='scheduled'?'var(--blue)':'var(--green)'}"><div style="display:flex;align-items:center;gap:7px;margin-bottom:5px"><div class="av av-pink">${(st.name||'?')[0]}</div><div style="flex:1"><div style="font-size:13px;font-weight:500">${st.name}</div><div style="font-size:11px;color:#999">原課：${orig?orig.name+' '+orig.day+' '+orig.time:'—'} · 請假：${m.leaveDate||'—'}</div>${mkSess?`<div style="font-size:11px;color:#0C447C">補課：${mkSess.name} ${mkSess.day} ${mkSess.time} · ${m.makeupDate}</div>`:''}</div><span class="pill ${sCls}">${sLabel}</span></div>${m.status==='pending'?`<div style="font-size:11px;color:#999;margin-bottom:4px">推薦同類班次</div>${suggested.map(sg=>{const v=getVenue(sg.venueId);return`<div style="display:flex;align-items:center;gap:5px;margin-bottom:4px;flex-wrap:wrap">${v?`<span style="font-size:9px;padding:1px 4px;border-radius:3px;color:#fff;background:${v.color}">${v.shortName}</span>`:''}<span style="font-size:11px;flex:1">${sg.name} · ${sg.day} ${sg.time}</span><input type="date" id="mkd-${m.id}-${sg.id}" style="width:auto;font-size:11px;padding:2px 5px"><button class="btn btn-blue" style="font-size:11px;padding:2px 7px" onclick="schedMakeup('${m.id}','${sg.id}',document.getElementById('mkd-${m.id}-${sg.id}').value)">安排</button></div>`;}).join('')||'<div style="font-size:11px;color:#999">無同類空位</div>'}<div style="display:flex;gap:5px;margin-top:5px;flex-wrap:wrap"><select id="mks-${m.id}" style="flex:1;font-size:11px">${sessions.map(s=>{const v=getVenue(s.venueId);return`<option value="${s.id}">${v?'['+v.shortName+'] ':''}${s.day} ${s.time} — ${s.name}</option>`;}).join('')}</select><input type="date" id="mkd2-${m.id}" style="width:auto;font-size:11px;padding:3px"><button class="btn btn-pink" style="font-size:11px;padding:3px 8px" onclick="schedMakeup('${m.id}',document.getElementById('mks-${m.id}').value,document.getElementById('mkd2-${m.id}').value)">手動安排</button></div>`:''}${m.status==='scheduled'?`<button class="btn btn-outline" style="font-size:11px;padding:2px 8px" onclick="cancelMakeup('${m.id}')">取消安排</button>`:''}</div>`;}).join('');}
async function schedMakeup(mkId,sessId,date){if(!date){alert('請選擇補課日期');return;}const m=makeupRec.find(x=>x.id===mkId);if(m){m.makeupSessionId=sessId;m.makeupDate=date;m.status='scheduled';}await saveCol('makeup',makeupRec);renderMakeup();}
async function cancelMakeup(mkId){const m=makeupRec.find(x=>x.id===mkId);if(m){m.makeupSessionId=null;m.makeupDate=null;m.status='pending';}await saveCol('makeup',makeupRec);renderMakeup();}

// ── FEE ──────────────────────────────────────────────
function buildFeTermFilter(){const sel=document.getElementById('fee-term-filter');sel.innerHTML='<option value="all">全部期別</option>'+terms.sort((a,b)=>a.startDate.localeCompare(b.startDate)).map(t=>`<option value="${t.id}">${t.name}</option>`).join('');}
function renderFee(){const tF=document.getElementById('fee-term-filter').value,sF=document.getElementById('fee-status-filter').value;let list=fees;if(tF!=='all')list=list.filter(f=>f.termId===tF);const ws=list.map(f=>({f,s:feeStatus(f)}));if(sF==='unpaid')list=ws.filter(({s})=>s.bal>0&&!s.refunded).map(({f})=>f);else if(sF==='paid')list=ws.filter(({s})=>s.bal<=0&&!s.refunded).map(({f})=>f);else if(sF==='overdue')list=ws.filter(({s})=>s.label==='逾期').map(({f})=>f);else if(sF==='refunded')list=ws.filter(({s})=>s.refunded).map(({f})=>f);else list=ws.map(({f})=>f);const ti=fees.filter(f=>f.status!=='refunded').reduce((a,f)=>a+f.amount,0),tp=txns.filter(t=>t.type==='pay').reduce((a,t)=>a+t.amount,0),tw=fees.filter(f=>f.status!=='refunded').reduce((a,f)=>a+feeStatus(f).bal,0),tr=txns.filter(t=>t.type==='refund').reduce((a,t)=>a+t.amount,0);document.getElementById('fee-metrics').innerHTML=`<div class="mc"><div class="mc-lbl">總開帳</div><div class="mc-val">${fmt(ti)}</div></div><div class="mc"><div class="mc-lbl">已收款</div><div class="mc-val" style="color:#27500A">${fmt(tp)}</div></div><div class="mc"><div class="mc-lbl">未收款</div><div class="mc-val" style="color:${tw>0?'#A32D2D':'inherit'}">${fmt(tw)}</div></div><div class="mc"><div class="mc-lbl">退費合計</div><div class="mc-val" style="color:${tr>0?'#A32D2D':'inherit'}">${fmt(tr)}</div></div>`;if(feeSub==='ledger'){renderLedger();return;}if(feeSub==='refunds'){renderRefundList();return;}renderBills(list);}
function renderBills(list){document.getElementById('fee-body').innerHTML=list.length?list.map(f=>{const s=feeStatus(f);const st=getSt(f.studentId);const t=f.termId?terms.find(x=>x.id===f.termId):null;const isRef=f.status==='refunded';return`<div class="card" style="border-left:3px solid ${isRef?'#ccc':s.label==='逾期'?'var(--red)':s.bal>0&&s.paid>0?'var(--amber)':s.bal<=0?'var(--green)':'var(--blue)'}"><div style="display:flex;align-items:flex-start;gap:7px;margin-bottom:5px"><div class="av av-pink">${(st.name||'?')[0]}</div><div style="flex:1"><div style="font-size:13px;font-weight:500">${st.name}</div><div style="font-size:11px;color:#999">${f.description||'課程費用'}${t?' · '+t.name:''}</div>${f.termStartDate?`<div style="font-size:11px;color:#999">上課期間：${fmtD(f.termStartDate)} — ${fmtD(f.termEndDate)}</div>`:''}</div><span class="pill ${s.cls}">${s.label}</span></div>${!isRef?`<div class="pbar-wrap"><div class="pbar" style="width:${s.pct}%;background:${s.label==='逾期'?'var(--red)':s.pct<100?'var(--amber)':'var(--green)'}"></div></div>`:''}<div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-top:4px"><span style="font-size:11px;color:#999">${isRef?'退費：'+fmt(f.amount):'已繳 '+fmt(s.paid)+' / 應繳 '+fmt(s.net)}</span><span style="font-size:13px;font-weight:500;margin-left:auto;color:${s.bal>0?'#A32D2D':'#888'}">${isRef?'已退費':s.bal>0?'-'+fmt(s.bal):'結清'}</span>${!isRef&&s.bal>0?`<button class="btn btn-green" style="font-size:11px;padding:3px 8px" onclick="openPayMod('${f.id}')">收款</button>`:''}<button class="btn btn-outline" style="font-size:11px;padding:3px 8px" onclick="openFeeHist('${f.id}')">明細</button>${!isRef?`<button class="btn btn-red" style="font-size:11px;padding:3px 8px" onclick="openRefundMod('${f.id}')">退費</button>`:''}<button class="btn btn-red" style="font-size:11px;padding:3px 8px" onclick="deleteFee('${f.id}')">刪除</button></div></div>`;}).join(''):'<div class="empty">沒有符合條件的帳單</div>';}
function renderLedger(){const allTxns=txns.filter(t=>t.type==='pay').sort((a,b)=>b.date.localeCompare(a.date));const total=allTxns.reduce((a,t)=>a+t.amount,0);document.getElementById('fee-body').innerHTML=`<div style="background:#fff;border:0.5px solid #e0e0e0;border-radius:12px;overflow:hidden"><table class="tbl"><colgroup><col style="width:16%"><col style="width:15%"><col style="width:28%"><col style="width:15%"><col style="width:13%"><col style="width:13%"></colgroup><thead><tr><th>日期</th><th>學生</th><th>說明</th><th>金額</th><th>方式</th><th>狀態</th></tr></thead><tbody>${allTxns.map(t=>{const f=fees.find(x=>x.id===t.feeId);const st=getSt(t.studentId);return`<tr><td>${t.date}</td><td>${st.name}</td><td>${f?f.description:'—'}</td><td style="font-weight:500;color:#27500A">${fmt(t.amount)}</td><td>${t.method||'—'}</td><td><span class="pill pill-green">已收</span></td></tr>`;}).join('')}<tr style="background:#f8f8f8"><td colspan="3" style="font-weight:500;text-align:right;padding:7px 9px">合計</td><td style="font-weight:500;color:#27500A;padding:7px 9px">${fmt(total)}</td><td colspan="2"></td></tr></tbody></table></div>`;}
function renderRefundList(){const refTxns=txns.filter(t=>t.type==='refund').sort((a,b)=>b.date.localeCompare(a.date));const total=refTxns.reduce((a,t)=>a+t.amount,0);document.getElementById('fee-body').innerHTML=refTxns.length?`<div style="background:#fff;border:0.5px solid #e0e0e0;border-radius:12px;overflow:hidden"><table class="tbl"><colgroup><col style="width:16%"><col style="width:15%"><col style="width:28%"><col style="width:14%"><col style="width:27%"></colgroup><thead><tr><th>日期</th><th>學生</th><th>課程</th><th>退費金額</th><th>原因</th></tr></thead><tbody>${refTxns.map(t=>{const f=fees.find(x=>x.id===t.feeId);const st=getSt(t.studentId);return`<tr><td>${t.date}</td><td>${st.name}</td><td>${f?f.description:'—'}</td><td style="font-weight:500;color:#A32D2D">${fmt(t.amount)}</td><td style="color:#999">${t.note||'—'}</td></tr>`;}).join('')}<tr style="background:#f8f8f8"><td colspan="3" style="font-weight:500;text-align:right;padding:7px 9px">退費合計</td><td style="font-weight:500;color:#A32D2D;padding:7px 9px">${fmt(total)}</td><td></td></tr></tbody></table></div>`:'<div class="empty">尚無退費記錄</div>';}
function openIssueFee(){renderFeeForm(null,null,null);}function openIssueFeeForTerm(termId){renderFeeForm(termId,null,null);}function openIssueFeePreset(stId,termId,sessId){renderFeeForm(termId,stId,sessId);}
function renderFeeForm(pT,pS,pSess){const to=terms.sort((a,b)=>a.startDate.localeCompare(b.startDate)).map(t=>`<option value="${t.id}" ${t.id===pT?'selected':''}>${t.name}</option>`).join('');const stu=students.map(s=>`<option value="${s.id}" ${s.id===pS?'selected':''}>${s.name}</option>`).join('');const preTerm=terms.find(t=>t.id===pT);const termSessions=preTerm?sessions.filter(s=>preTerm.sessions&&preTerm.sessions.includes(s.id)):sessions;const so='<option value="">— 未指定 —</option>'+termSessions.sort((a,b)=>(DAY_ORDER[a.day]||9)-(DAY_ORDER[b.day]||9)).map(s=>{const pr=getSessPrice(s.id);return`<option value="${s.id}" data-price="${pr||''}" data-name="${s.name+' '+s.day+s.time}" ${s.id===pSess?'selected':''}>${s.name} · ${s.day} ${s.time}${pr!=null?' — '+fmt(pr):'（未設費率）'}</option>`;}).join('');const preSess=pSess?getSess(pSess):null;const autoPrice=pSess?getSessPrice(pSess):null;const due=addWeeks(today(),14);document.getElementById('mod-title').textContent='開立帳單';document.getElementById('mod-body').innerHTML=`<div class="fg"><div class="fr"><label>學生 *</label><select id="if-stu">${stu||'<option>請先新增學生</option>'}</select></div><div class="fr"><label>期別</label><select id="if-term" onchange="ifTermChange()">${to}</select></div></div><div class="fr"><label>課程（自動帶入學費）</label><select id="if-sess" onchange="ifSessChange()">${so}</select></div>${preTerm?`<div style="background:#E6F1FB;border-radius:8px;padding:7px 9px;font-size:11px;color:#0C447C;margin-bottom:8px">上課期間：${fmtD(preTerm.startDate)} — ${fmtD(preTerm.endDate)}</div>`:'<div id="if-period-info"></div>'}<div class="fg"><div class="fr"><label>金額 (NT$) *</label><input type="number" id="if-amt" value="${autoPrice||''}" min="0" step="100" oninput="ifPrev()"></div><div class="fr"><label>折扣 (NT$)</label><input type="number" id="if-disc" value="0" min="0" oninput="ifPrev()"></div></div><div class="fg"><div class="fr"><label>到期日</label><input type="date" id="if-due" value="${due}"></div><div class="fr"><label>說明</label><input type="text" id="if-note" value="${preSess?preSess.name+' '+preSess.day+preSess.time:''}" placeholder="課程費用"></div></div><div id="if-prev" style="margin-bottom:8px"></div><button class="btn btn-pink" style="width:100%" onclick="issueFee()">確認開立</button>`;ifPrev();document.getElementById('overlay').style.display='flex';}
function ifTermChange(){const termId=document.getElementById('if-term').value;const t=terms.find(x=>x.id===termId);const ts=t?sessions.filter(s=>t.sessions&&t.sessions.includes(s.id)):sessions;const so='<option value="">— 未指定 —</option>'+ts.sort((a,b)=>(DAY_ORDER[a.day]||9)-(DAY_ORDER[b.day]||9)).map(s=>{const pr=getSessPrice(s.id);return`<option value="${s.id}" data-price="${pr||''}" data-name="${s.name+' '+s.day+s.time}">${s.name} · ${s.day} ${s.time}${pr!=null?' — '+fmt(pr):'（未設費率）'}</option>`;}).join('');document.getElementById('if-sess').innerHTML=so;ifSessChange();}
function ifSessChange(){const sel=document.getElementById('if-sess');const opt=sel.options[sel.selectedIndex];const price=opt&&opt.dataset.price?parseFloat(opt.dataset.price):null;const name=opt&&opt.dataset.name?opt.dataset.name:'';if(price!=null)document.getElementById('if-amt').value=price;const noteEl=document.getElementById('if-note');if(noteEl&&name)noteEl.value=name;ifPrev();}
function ifPrev(){const a=parseFloat(document.getElementById('if-amt').value)||0,d=parseFloat(document.getElementById('if-disc').value)||0;document.getElementById('if-prev').innerHTML=`<div class="rbox"><div class="rrow"><span style="color:#999">費用</span><span>${fmt(a)}</span></div>${d>0?`<div class="rrow"><span style="color:#999">折扣</span><span style="color:#A32D2D">-${fmt(d)}</span></div>`:''}<div class="rrow rtotal"><span>應繳</span><span>${fmt(a-d)}</span></div></div>`;}
async function issueFee(){const stId=document.getElementById('if-stu').value,amt=parseFloat(document.getElementById('if-amt').value)||0,disc=parseFloat(document.getElementById('if-disc').value)||0;if(!stId||amt<=0){alert('請選擇學生並輸入金額');return;}const sessId=document.getElementById('if-sess').value||null;const termId=document.getElementById('if-term').value||null;const term=terms.find(t=>t.id===termId);const fee={id:'f'+Date.now(),studentId:stId,termId,sessionId:sessId,amount:amt,description:document.getElementById('if-note').value||'課程費用',dueDate:document.getElementById('if-due').value,issuedDate:today(),termStartDate:term?.startDate||null,termEndDate:term?.endDate||null};fees.push(fee);if(disc>0)txns.push({id:'t'+Date.now(),feeId:fee.id,studentId:stId,type:'disc',amount:disc,date:today(),method:'—',note:'開帳折扣'});await saveCol('fees',fees);await saveCol('txns',txns);closeMod();renderFee();renderDash();}
function openPayMod(feeId){const f=fees.find(x=>x.id===feeId);if(!f)return;const s=feeStatus(f);const st=getSt(f.studentId);document.getElementById('mod-title').textContent='收款 — '+st.name;document.getElementById('mod-body').innerHTML=`<div class="rbox"><div class="rrow"><span style="color:#999">應繳</span><span>${fmt(s.net)}</span></div><div class="rrow"><span style="color:#999">已繳</span><span style="color:#27500A">${fmt(s.paid)}</span></div><div class="rrow rtotal"><span>尚欠</span><span style="color:#A32D2D">${fmt(s.bal)}</span></div></div><div class="fg"><div class="fr"><label>收款金額</label><input type="number" id="pay-amt" value="${s.bal}" min="1"></div><div class="fr"><label>付款方式</label><select id="pay-meth"><option>現金</option><option>轉帳</option><option>LINE Pay</option><option>信用卡</option></select></div></div><div class="fg"><div class="fr"><label>日期</label><input type="date" id="pay-date" value="${today()}"></div><div class="fr"><label>備註</label><input type="text" id="pay-note"></div></div><button class="btn btn-green" style="width:100%" onclick="recordPay('${feeId}')">確認收款</button>`;document.getElementById('overlay').style.display='flex';}
async function recordPay(feeId){const amt=parseFloat(document.getElementById('pay-amt').value)||0;if(amt<=0){alert('請輸入金額');return;}const f=fees.find(x=>x.id===feeId);txns.push({id:'t'+Date.now(),feeId,studentId:f?f.studentId:'',type:'pay',amount:amt,method:document.getElementById('pay-meth').value,date:document.getElementById('pay-date').value,note:document.getElementById('pay-note').value});await saveCol('txns',txns);closeMod();renderFee();renderDash();}
function openRefundMod(feeId){const f=fees.find(x=>x.id===feeId);if(!f)return;const s=feeStatus(f);const st=getSt(f.studentId);document.getElementById('mod-title').textContent='退費 — '+st.name;document.getElementById('mod-body').innerHTML=`<div class="rbox"><div class="rrow"><span style="color:#999">課程</span><span>${f.description}</span></div><div class="rrow"><span style="color:#999">已收款</span><span style="color:#27500A">${fmt(s.paid)}</span></div><div class="rrow rtotal"><span>可退款最高</span><span style="color:#A32D2D">${fmt(s.paid)}</span></div></div><div class="fg"><div class="fr"><label>退費金額 (NT$) *</label><input type="number" id="ref-amt" value="${s.paid}" min="0" step="100"></div><div class="fr"><label>退費日期</label><input type="date" id="ref-date" value="${today()}"></div></div><div class="fr"><label>退費原因 *</label><select id="ref-reason-sel" onchange="document.getElementById('ref-reason').value=this.value==='other'?'':this.value"><option value="">請選擇原因</option><option value="家長退選課程">家長退選課程</option><option value="課程取消">課程取消</option><option value="身體不適無法上課">身體不適無法上課</option><option value="搬家 / 住址異動">搬家 / 住址異動</option><option value="other">其他（自填）</option></select></div><div class="fr"><label>退費原因（詳述）</label><input type="text" id="ref-reason" placeholder="請填寫退費原因"></div><div class="info-box" style="margin-top:4px">退費後此帳單將標記為「已退費」。</div><button class="btn btn-red" style="width:100%" onclick="recordRefund('${feeId}')">確認退費</button>`;document.getElementById('overlay').style.display='flex';}
async function recordRefund(feeId){const amt=parseFloat(document.getElementById('ref-amt').value)||0;const reason=document.getElementById('ref-reason').value.trim();if(amt<=0){alert('請輸入退費金額');return;}if(!reason){alert('請填寫退費原因');return;}const f=fees.find(x=>x.id===feeId);if(!f)return;txns.push({id:'t'+Date.now(),feeId,studentId:f.studentId,type:'refund',amount:amt,date:document.getElementById('ref-date').value,note:reason,method:'退費'});f.status='refunded';await saveCol('fees',fees);await saveCol('txns',txns);closeMod();renderFee();renderDash();}
function openFeeHist(feeId){const f=fees.find(x=>x.id===feeId);if(!f)return;const s=feeStatus(f);const st=getSt(f.studentId);const rel=txns.filter(t=>t.feeId===feeId).sort((a,b)=>b.date.localeCompare(a.date));document.getElementById('mod-title').textContent='帳單明細 — '+st.name;document.getElementById('mod-body').innerHTML=`<div class="rbox"><div class="rrow"><span style="color:#999">說明</span><span>${f.description}</span></div>${f.termStartDate?`<div class="rrow"><span style="color:#999">上課期間</span><span>${fmtD(f.termStartDate)} — ${fmtD(f.termEndDate)}</span></div>`:''}<div class="rrow rtotal"><span>餘額</span><span style="color:${s.bal>0?'#A32D2D':'#27500A'}">${s.bal>0?fmt(s.bal):'結清'}</span></div></div>${rel.map(t=>`<div style="display:flex;align-items:center;gap:7px;padding:4px 0;border-bottom:0.5px solid #e0e0e0"><div style="flex:1"><div style="font-size:12px">${{pay:'收款',disc:'折扣',refund:'退費'}[t.type]||t.type}${t.note?' · '+t.note:''}</div><div style="font-size:10px;color:#999">${t.date} · ${t.method||'—'}</div></div><div style="font-size:13px;font-weight:500;color:${t.type==='pay'?'#27500A':'#A32D2D'}">${t.type==='pay'?'+':'-'}${fmt(t.amount)}</div></div>`).join('')||'<div class="empty">尚無交易</div>'}${s.bal>0&&!f.status?`<button class="btn btn-green" style="width:100%;margin-top:8px" onclick="closeMod();openPayMod('${feeId}')">收款</button>`:''}`;document.getElementById('overlay').style.display='flex';}
async function deleteFee(feeId){if(!confirm('確認刪除此帳單？'))return;fees=fees.filter(f=>f.id!==feeId);txns=txns.filter(t=>t.feeId!==feeId);await saveCol('fees',fees);await saveCol('txns',txns);closeMod();renderFee();renderDash();}

function renderStudents(){const q=(document.getElementById('stu-search').value||'').toLowerCase();let list=students.filter(st=>!q||st.name.toLowerCase().includes(q)||(st.parent||'').toLowerCase().includes(q));if(!list.length){document.getElementById('students-body').innerHTML='<div class="empty">沒有符合的學生</div>';return;}document.getElementById('students-body').innerHTML=list.map(st=>{const stE=enrolls.filter(e=>e.studentId===st.id&&e.status==='enrolled');const owed=fees.filter(f=>f.studentId===st.id&&f.status!=='refunded').reduce((a,f)=>a+feeStatus(f).bal,0);const gc=st.gender==='male'?'#378ADD':'#D4537E';return`<div class="card"><div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><div style="width:34px;height:34px;border-radius:50%;background:${st.gender==='male'?'#E6F1FB':'#FBEAF0'};color:${gc};display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500">${(st.name||'?')[0]}</div><div style="flex:1"><div style="display:flex;align-items:center;gap:5px"><span style="font-size:14px;font-weight:500">${st.name}</span>${st.gender?`<span style="font-size:10px;padding:1px 6px;border-radius:6px;background:${st.gender==='male'?'#E6F1FB':'#FBEAF0'};color:${gc}">${st.gender==='male'?'♂ 男':'♀ 女'}</span>`:''}</div><div style="font-size:11px;color:#999">${st.parent||'—'} · ${st.phone||'—'}${st.lineId?' · LINE: '+st.lineId:''}</div></div>${owed>0?`<span class="pill pill-red">欠 ${fmt(owed)}</span>`:'<span class="pill pill-green">學費結清</span>'}<button class="btn btn-outline" style="font-size:11px;padding:3px 8px" onclick="openEditStudent('${st.id}')">編輯</button><button class="btn btn-red" style="font-size:10px;padding:2px 7px" onclick="delStu('${st.id}')">刪除</button></div><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:5px;margin:5px 0;background:#f8f8f8;border-radius:8px;padding:7px 9px"><div><div style="font-size:10px;color:#999">年齡</div><div style="font-size:12px;font-weight:500">${fmtAge(st.ageY,st.ageM)||'—'}</div></div><div><div style="font-size:10px;color:#999">身高</div><div style="font-size:12px;font-weight:500">${st.height?st.height+' cm':'—'}</div></div><div><div style="font-size:10px;color:#999">每期堂數</div><div style="font-size:12px;font-weight:500">${st.period||'—'} 堂</div></div><div><div style="font-size:10px;color:#999">出席 / 假剩</div><div style="font-size:12px;font-weight:500">${st.attended||0} / ${(st.leaveMax||2)-(st.leaves||0)}</div></div></div><div style="margin-bottom:6px">${stE.map(e=>{const s=getSess(e.sessionId);const t=terms.find(x=>x.id===e.termId);const v=s?getVenue(s.venueId):null;const pr=s?getSessPrice(s.id):null;return s?`<span style="font-size:11px;padding:2px 7px;border-radius:7px;background:#f8f8f8;display:inline-block;margin:2px 2px 0 0">${v?'['+v.shortName+'] ':''}${t?t.name+' ':''}${s.name} ${s.day} ${s.time}${pr!=null?' <span style="color:#27500A">'+fmt(pr)+'</span>':''}</span>`:''}).join('')||'<span style="font-size:11px;color:#999">未報名</span>'}</div><div style="display:flex;gap:5px"><button class="btn btn-pink" style="font-size:11px;padding:3px 8px" onclick="openIssueFeeForStudent('${st.id}')">開帳單</button></div></div>`;}).join('');}
function stuFormHTML(d){return`<div class="section-div">孩子資料</div><div class="fg"><div class="fr"><label>孩子姓名 *</label><input type="text" id="ns-n" value="${d.name||''}" placeholder="姓名"></div><div class="fr"><label>孩子性別</label><select id="ns-g"><option value="" ${!d.gender?'selected':''}>不填</option><option value="male" ${d.gender==='male'?'selected':''}>男生</option><option value="female" ${d.gender==='female'?'selected':''}>女生</option></select></div></div><div class="fg3"><div class="fr"><label>年齡（歲）</label><input type="number" id="ns-ay" value="${d.ageY||''}" min="0" max="18" placeholder="Y"></div><div class="fr"><label>年齡（月）</label><input type="number" id="ns-am" value="${d.ageM||''}" min="0" max="11" placeholder="M"></div><div class="fr"><label>身高（cm）</label><input type="number" id="ns-h" value="${d.height||''}" min="50" max="200" placeholder="cm"></div></div><div class="section-div">家長資料</div><div class="fg"><div class="fr"><label>家長姓名</label><input type="text" id="ns-p" value="${d.parent||''}" placeholder="家長姓名"></div><div class="fr"><label>聯絡電話</label><input type="tel" id="ns-ph" value="${d.phone||''}" placeholder="手機號碼"></div></div><div class="fr"><label>家長 LINE ID</label><input type="text" id="ns-line" value="${d.lineId||''}" placeholder="LINE ID"></div><div class="section-div">學生課程</div><div class="fr"><label>選擇課程（自動帶入堂數）</label><select id="ns-sess" onchange="nsAutoLessons()"><option value="">— 未指定 —</option>${sessions.sort((a,b)=>(DAY_ORDER[a.day]||9)-(DAY_ORDER[b.day]||9)).map(s=>{const v=getVenue(s.venueId);const pr=getSessPrice(s.id);return`<option value="${s.id}" data-lessons="${s.periodLessons}" ${(d.sessionId||'')==s.id?'selected':''}>${v?'['+v.shortName+'] ':''}${s.name} · ${s.day} ${s.time} (${s.periodLessons}堂${pr!=null?' · '+fmt(pr):''})</option>`;}).join('')}</select></div><div id="ns-lessons-display" style="background:#EAF3DE;border-radius:8px;padding:7px 9px;font-size:11px;color:#27500A;margin-bottom:2px;display:none">自動帶入每期堂數：<strong id="ns-lessons-val"></strong></div><div class="fr"><label>每期堂數（可手動調整）</label><select id="ns-l">${LESSON_OPTIONS.map(n=>`<option value="${n}" ${(d.period||6)===n?'selected':''}>${n} 堂</option>`).join('')}</select></div>`;}
function nsAutoLessons(){const sel=document.getElementById('ns-sess');const opt=sel.options[sel.selectedIndex];const lessons=opt&&opt.dataset.lessons?parseInt(opt.dataset.lessons):null;const display=document.getElementById('ns-lessons-display');const val=document.getElementById('ns-lessons-val');const lSel=document.getElementById('ns-l');if(lessons&&lessons>0){display.style.display='block';val.textContent=lessons+' 堂/期';if(lSel)lSel.value=lessons;}else{display.style.display='none';}}
function getStuData(){const sel=document.getElementById('ns-sess');return{name:document.getElementById('ns-n').value.trim(),gender:document.getElementById('ns-g').value,ageY:parseInt(document.getElementById('ns-ay').value)||0,ageM:parseInt(document.getElementById('ns-am').value)||0,height:parseFloat(document.getElementById('ns-h').value)||0,parent:document.getElementById('ns-p').value.trim(),phone:document.getElementById('ns-ph').value.trim(),lineId:document.getElementById('ns-line').value.trim(),sessionId:sel?sel.value:'',period:parseInt(document.getElementById('ns-l').value)||6};}
function openAddStudent(){document.getElementById('mod-title').textContent='新增學生';document.getElementById('mod-body').innerHTML=stuFormHTML({})+'<button class="btn btn-pink" style="width:100%;margin-top:8px" onclick="addStu()">確認新增</button>';document.getElementById('overlay').style.display='flex';setTimeout(nsAutoLessons,50);}
function openEditStudent(id){const st=students.find(s=>s.id===id);if(!st)return;document.getElementById('mod-title').textContent='編輯 — '+st.name;document.getElementById('mod-body').innerHTML=stuFormHTML(st)+`<div style="display:flex;gap:6px;margin-top:8px"><button class="btn btn-pink" style="flex:1" onclick="saveStudent('${id}')">儲存</button><button class="btn btn-red" onclick="delStu('${id}');closeMod()">刪除</button></div>`;document.getElementById('overlay').style.display='flex';setTimeout(nsAutoLessons,50);}
async function addStu(){const d=getStuData();if(!d.name){alert('請輸入學生姓名');return;}students.push({id:'s'+Date.now(),...d,attended:0,leaves:0,makeups:0,leaveMax:2,startDate:today()});await saveCol('students',students);closeMod();renderStudents();renderDash();}
async function saveStudent(id){const d=getStuData();if(!d.name){alert('請輸入學生姓名');return;}const i=students.findIndex(s=>s.id===id);if(i>=0)students[i]={...students[i],...d};await saveCol('students',students);closeMod();renderStudents();}
async function delStu(id){if(!confirm('確認刪除此學生？'))return;students=students.filter(s=>s.id!==id);await saveCol('students',students);renderStudents();renderDash();}
function openIssueFeeForStudent(stId){renderFeeForm(null,stId,null);}

function closeMod(){document.getElementById('overlay').style.display='none';}

// Extra state
let pendingSubs = [];
let curSiKey = '', curSiTermId = '', curSiSessId = '';

// ── Patch initApp to also load pending & build new selects ──
const _baseInit = initApp;
async function initApp() {
  showLoading('從 Firebase 載入資料…');
  try {
    venues   = await fsGet('venues');
    sessions = await fsGet('sessions');
    terms    = await fsGet('terms');
    enrolls  = await fsGet('enrolls');
    students = await fsGet('students');
    makeupRec= await fsGet('makeup');
    fees     = await fsGet('fees');
    txns     = await fsGet('txns');
    pricing  = await fsGet('pricing');
    pendingSubs = await fsGet('pending');
    const srSnap = await db.collection('signin').get();
    signinRec = {};
    srSnap.docs.forEach(d => { signinRec[d.id] = d.data(); });
    if (!venues.length)  { venues   = JSON.parse(JSON.stringify(SEED_VENUES));   await fsSave('venues',  venues);  }
    if (!sessions.length){ sessions = JSON.parse(JSON.stringify(SEED_SESSIONS)); await fsSave('sessions',sessions);}
    if (!terms.length)   { terms    = makeSeedTerms();                            await fsSave('terms',   terms);   }
    if (!pricing.length) { pricing  = JSON.parse(JSON.stringify(SEED_PRICING));  await fsSave('pricing', pricing); }
    document.getElementById('db-st').textContent = '✓ Firebase 已連線';
  } catch(e) {
    console.error(e);
    document.getElementById('db-st').textContent = '⚠ 離線';
    venues   = JSON.parse(JSON.stringify(SEED_VENUES));
    sessions = JSON.parse(JSON.stringify(SEED_SESSIONS));
    terms    = makeSeedTerms();
    pricing  = JSON.parse(JSON.stringify(SEED_PRICING));
    enrolls  = []; students = []; signinRec = {}; makeupRec = []; fees = []; txns = []; pendingSubs = [];
  }
  hideLoading();
  document.getElementById('si-date').value = today();
  buildSiTerms(); buildFeTermFilter(); buildRqTermSelect(); renderDash();
}

function buildRqTermSelect() {
  const sel = document.getElementById('rq-term');
  if (!sel) return;
  sel.innerHTML = '<option value="">選擇期別</option>' +
    [...terms].sort((a,b)=>a.startDate.localeCompare(b.startDate))
              .map(t=>`<option value="${t.id}">${t.name}</option>`).join('');
}

// ── Override sw() to handle new panels ──
function sw(tab, btn) {
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  document.getElementById('panel-'+tab).classList.add('active');
  if (btn) btn.classList.add('active');
  ({
    dash: renderDash,
    venues: renderVenues,
    sessions: renderSessions,
    terms: renderTerms,
    signin: renderSignin,
    makeup: renderMakeup,
    fee: renderFee,
    students: renderStudents,
    'reg-qr': renderRegQR,
  }[tab] || function(){})();
}

// Override renderTerms to add new buttons + show session dates + holidays
function renderTerms() {
  const f = document.getElementById('term-filter').value;
  let list = [...terms].sort((a,b)=>a.startDate.localeCompare(b.startDate));
  if (f !== 'all') list = list.filter(t => termStatus(t).key === f);

  document.getElementById('terms-body').innerHTML = list.map(t => {
    const st = termStatus(t);
    const sl = sessions.filter(s => t.sessions && t.sessions.includes(s.id));
    const allE = enrolls.filter(e=>e.termId===t.id&&e.status==='enrolled').length;
    const allW = enrolls.filter(e=>e.termId===t.id&&e.status==='waitlist').length;
    const weeks = t.startDate&&t.endDate ? Math.round((new Date(t.endDate)-new Date(t.startDate))/(7*86400000)) : 0;
    const holidays = t.holidays || [];
    const sessDates = t.sessionDates || {};

    return `<div class="card">
      <div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:6px">
        <div style="flex:1">
          <div style="font-size:14px;font-weight:500">${t.name}</div>
          <div style="font-size:11px;color:#999;margin-top:1px">上課：${fmtD(t.startDate)} — ${fmtD(t.endDate)} · 共${weeks}週 | 報名：${fmtD(t.enrollStartDate)} — ${fmtD(t.enrollEndDate)}</div>
        </div>
        <span class="pill ${pillCls(st.key)}">${st.label}</span>
      </div>
      ${st.key==='active'?`<div class="pbar-wrap" style="margin-bottom:6px"><div class="pbar" style="width:${termProgress(t)}%;background:${t.color||'var(--green)'}"></div></div>`:''}
      ${holidays.length ? `<div style="margin-bottom:6px"><span style="font-size:11px;color:#BA7517;margin-right:4px">🚫 休課日：</span>${holidays.map(h=>`<span class="holiday-tag">${fmtD(h.date)} ${h.reason||''}</span>`).join('')}</div>` : ''}
      <div style="display:flex;gap:5px;margin-bottom:7px;flex-wrap:wrap">
        ${allE?`<span class="enroll-chip ec-enrolled">正取 ${allE}</span>`:''}
        ${allW?`<span class="enroll-chip ec-wait">候補 ${allW}</span>`:''}
        <span class="pill pill-gray">${sl.length} 班次</span>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:5px;margin-bottom:8px">
        ${sl.sort((a,b)=>(DAY_ORDER[a.day]||9)-(DAY_ORDER[b.day]||9)).map(s => {
          const v = getVenue(s.venueId);
          const cnt = getEnrolled(t.id,s.id).length;
          const pr = getSessPrice(s.id);
          const isFull = cnt >= s.capacity;
          const sd = sessDates[s.id] || {};
          return `<div style="background:#f8f8f8;border-radius:8px;padding:6px 9px">
            <div style="display:flex;align-items:center;gap:4px;margin-bottom:3px">
              ${v?`<span style="font-size:9px;padding:1px 4px;border-radius:3px;color:#fff;background:${v.color}">${v.shortName}</span>`:''}
              <span class="badge ${s.type}">${tLabel(s.type)}</span>
              <span style="font-size:11px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.name} ${s.day} ${s.time}</span>
            </div>
            ${sd.start ? `<div class="session-date-chip">📅 ${fmtD(sd.start)} — ${fmtD(sd.end)}</div>` : ''}
            <div style="display:flex;align-items:center;gap:5px">
              <span style="font-size:11px;font-weight:500;color:${isFull?'#A32D2D':'#27500A'}">${cnt}/${s.capacity}</span>
              <span style="font-size:10px;color:#27500A">${s.periodLessons}堂</span>
              ${pr!=null?`<span class="fee-tag">${fmt(pr)}</span>`:''}
              <div class="cap-bar-wrap" style="flex:1"><div class="cap-bar" style="width:${Math.min(100,Math.round(cnt/s.capacity*100))}%;background:${isFull?'var(--red)':cnt/s.capacity>=0.8?'var(--amber)':'var(--green)'}"></div></div>
            </div>
          </div>`;
        }).join('')}
      </div>
      <div style="display:flex;gap:5px;flex-wrap:wrap">
        <button class="btn btn-pink" style="font-size:11px;padding:3px 9px" onclick="openAddEnroll('${t.id}')">+ 報名</button>
        <button class="btn btn-outline" style="font-size:11px;padding:3px 9px" onclick="openTermRoster('${t.id}')">名單</button>
        <button class="btn btn-outline" style="font-size:11px;padding:3px 9px" onclick="openCourseDates('${t.id}')">📅 課程日期</button>
        <button class="btn btn-outline" style="font-size:11px;padding:3px 9px" onclick="openHolidays('${t.id}')">🚫 休課管理</button>
        <button class="btn btn-outline" style="font-size:11px;padding:3px 9px" onclick="openTermAttendance('${t.id}')">📋 點名總覽</button>
        <button class="btn btn-outline" style="font-size:11px;padding:3px 9px" onclick="openIssueFeeForTerm('${t.id}')">開帳單</button>
        <button class="btn btn-outline" style="font-size:11px;padding:3px 9px" onclick="openEditTerm('${t.id}')">編輯</button>
        <button class="btn btn-outline" style="font-size:11px;padding:3px 9px" onclick="cloneTerm('${t.id}')">複製下期</button>
        <button class="btn btn-red" style="font-size:11px;padding:3px 9px" onclick="deleteTerm('${t.id}')">刪除</button>
      </div>
    </div>`;
  }).join('') || '<div class="empty">沒有符合條件的期別</div>';
}

// ── Course dates per session ──────────────────────────
function openCourseDates(termId) {
  const t = terms.find(x=>x.id===termId); if (!t) return;
  const sl = sessions.filter(s=>t.sessions&&t.sessions.includes(s.id));
  const sd = t.sessionDates || {};
  document.getElementById('mod-title').textContent = '課程啟迄日期 — ' + t.name;
  document.getElementById('mod-body').innerHTML = `
    <div class="info-box">每個班次可設定獨立的實際開始/結束日期，例如因節慶或教練休假而延後或提早。若未填寫則沿用期別預設日期。</div>
    ${sl.map(s => {
      const v = getVenue(s.venueId);
      const cur = sd[s.id] || {};
      return `<div style="background:#f8f8f8;border-radius:8px;padding:9px 11px;margin-bottom:8px">
        <div style="display:flex;align-items:center;gap:5px;margin-bottom:7px">
          ${v?`<span style="font-size:9px;padding:1px 4px;border-radius:3px;color:#fff;background:${v.color}">${v.shortName}</span>`:''}
          <span class="badge ${s.type}">${tLabel(s.type)}</span>
          <span style="font-size:12px;font-weight:500">${s.name} · ${s.day} ${s.time}</span>
        </div>
        <div class="fg">
          <div class="fr"><label>實際開始日期</label><input type="date" id="csd-s-${s.id}" value="${cur.start||t.startDate||''}"></div>
          <div class="fr"><label>實際結束日期</label><input type="date" id="csd-e-${s.id}" value="${cur.end||t.endDate||''}"></div>
        </div>
      </div>`;
    }).join('') || '<div class="empty">此期別無班次</div>'}
    <button class="btn btn-pink" style="width:100%" onclick="saveCourseDates('${termId}')">儲存課程日期</button>`;
  document.getElementById('overlay').style.display = 'flex';
}

async function saveCourseDates(termId) {
  const t = terms.find(x=>x.id===termId); if (!t) return;
  const sl = sessions.filter(s=>t.sessions&&t.sessions.includes(s.id));
  const sd = {};
  sl.forEach(s => {
    const start = document.getElementById('csd-s-'+s.id)?.value;
    const end   = document.getElementById('csd-e-'+s.id)?.value;
    if (start || end) sd[s.id] = { start: start||'', end: end||'' };
  });
  t.sessionDates = sd;
  await saveCol('terms', terms);
  closeMod(); renderTerms(); renderDash();
}

// ── Holiday management ────────────────────────────────
function openHolidays(termId) {
  const t = terms.find(x=>x.id===termId); if (!t) return;
  document.getElementById('mod-title').textContent = '休課管理 — ' + t.name;
  renderHolidayMod(termId, t.holidays||[]);
  document.getElementById('overlay').style.display = 'flex';
}

function renderHolidayMod(termId, holidays) {
  document.getElementById('mod-body').innerHTML = `
    <div class="info-box">新增節慶假日或教練休假日，系統會標示在期別卡片上提醒教練。</div>
    <div id="hd-list">
      ${holidays.length ? holidays.map((h,i) => `
        <div style="display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:0.5px solid #e0e0e0">
          <span style="font-size:12px;flex:1">${fmtD(h.date)}</span>
          <span style="font-size:12px;color:#666;flex:2">${h.reason||''}</span>
          <button class="btn btn-red" style="font-size:11px;padding:2px 7px" onclick="removeHoliday('${termId}',${i})">移除</button>
        </div>`).join('') : '<div style="font-size:11px;color:#999;padding:5px 0">尚無休課日</div>'}
    </div>
    <div style="border-top:0.5px solid #e0e0e0;margin-top:8px;padding-top:8px">
      <div style="font-size:12px;font-weight:500;margin-bottom:6px">新增休課日</div>
      <div class="fg">
        <div class="fr"><label>日期</label><input type="date" id="new-hd-date" value="${today()}"></div>
        <div class="fr"><label>原因</label><input type="text" id="new-hd-reason" placeholder="如：國慶日、教練請假"></div>
      </div>
      <button class="btn btn-amber" style="background:var(--amber);color:#fff;width:100%" onclick="addHoliday('${termId}')">新增休課日</button>
    </div>`;
}

async function addHoliday(termId) {
  const t = terms.find(x=>x.id===termId); if (!t) return;
  const date   = document.getElementById('new-hd-date').value;
  const reason = document.getElementById('new-hd-reason').value.trim();
  if (!date) { alert('請選擇日期'); return; }
  if (!t.holidays) t.holidays = [];
  t.holidays.push({ date, reason });
  t.holidays.sort((a,b)=>a.date.localeCompare(b.date));
  await saveCol('terms', terms);
  renderHolidayMod(termId, t.holidays);
  renderTerms();
}

async function removeHoliday(termId, idx) {
  const t = terms.find(x=>x.id===termId); if (!t) return;
  t.holidays.splice(idx, 1);
  await saveCol('terms', terms);
  renderHolidayMod(termId, t.holidays);
  renderTerms();
}
