// Override renderSignin to support manual mode
function buildSiTerms() {
  const sel = document.getElementById('si-term');
  sel.innerHTML = [...terms].sort((a,b)=>a.startDate.localeCompare(b.startDate))
    .map(t=>`<option value="${t.id}" ${termStatus(t).key==='active'?'selected':''}>${t.name}</option>`).join('');
  buildSiSess();
}

function buildSiSess() {
  const termId = document.getElementById('si-term').value;
  const t = terms.find(x=>x.id===termId);
  document.getElementById('si-sess').innerHTML = t
    ? sessions.filter(s=>t.sessions&&t.sessions.includes(s.id))
              .sort((a,b)=>(DAY_ORDER[a.day]||9)-(DAY_ORDER[b.day]||9))
              .map(s=>{const v=getVenue(s.venueId);return`<option value="${s.id}">${v?'['+v.shortName+'] ':''}${s.day} ${s.time} — ${s.name}</option>`;}).join('')
    : '';
  renderSignin();
}

function renderSignin() {
  const termId = document.getElementById('si-term').value;
  const sessId = document.getElementById('si-sess').value;
  const date   = document.getElementById('si-date').value;
  const s = getSess(sessId); if (!s) return;
  curSiKey = sessId+'|'+date; curSiTermId = termId; curSiSessId = sessId;
  const rec      = signinRec[curSiKey] || {};
  const co       = COACHES[s.coach] || {};
  const v        = getVenue(s.venueId);
  const enrolled = getEnrolled(termId, sessId);
  const mkStu    = makeupRec.filter(m=>m.makeupSessionId===sessId&&m.makeupDate===date&&m.status==='scheduled');
  const presentN = Object.values(rec).filter(x=>x==='present').length;
  const leaveN   = Object.values(rec).filter(x=>x==='leave').length;
  const isManual = document.getElementById('manual-mode')?.checked || false;

  // Show/hide save button
  const saveBtn = document.getElementById('manual-save-btn');
  if (saveBtn) saveBtn.style.display = isManual ? 'inline-block' : 'none';

  // QR box
  const qrUrl = `https://haloway.app/signin?s=${sessId}&t=${termId}&d=${date}`;
  document.getElementById('qr-area').innerHTML = `
    <div class="qr-box">
      <div style="font-size:12px;font-weight:500;margin-bottom:7px">家長 QR Code 簽到</div>
      <div class="qr-grid">
        <canvas id="qr-cv" width="96" height="96" style="border-radius:6px;background:#fff;padding:4px;display:block"></canvas>
        <div>
          <div style="font-size:12px;font-weight:500">${s.name}</div>
          <div style="font-size:11px;color:#999">${v?v.name+' · ':''}${s.day} ${s.time} · ${s.coach} · ${date}</div>
          <div style="display:flex;gap:5px;margin-top:5px">
            <button class="btn btn-outline" style="font-size:11px;padding:3px 8px" onclick="dlQR()">下載 QR</button>
            <button class="btn btn-outline" style="font-size:11px;padding:3px 8px" onclick="simScan('${termId}','${sessId}','${date}')">模擬掃碼</button>
          </div>
        </div>
      </div>
    </div>`;
  try { new QRious({element:document.getElementById('qr-cv'),value:qrUrl,size:96,foreground:'#1a1a1a',background:'#ffffff'}); } catch(e) {}

  // Stats bar
  const statsBar = `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;padding:8px 10px;background:#f8f8f8;border-radius:8px">
      <div class="av" style="background:${co.color||'#eee'}20;color:${co.color||'#666'};width:28px;height:28px;font-size:12px">${s.coach[0]}</div>
      <div>
        <div style="font-size:12px;font-weight:500">${s.coach} · ${v?v.name:''}</div>
        <div style="font-size:11px;color:#999">${s.name} · ${date}${isManual?' · <span style="color:#639922">✏️ 手動模式</span>':''}</div>
      </div>
      <div style="margin-left:auto;display:flex;gap:12px">
        <div style="text-align:center"><div style="font-size:15px;font-weight:500;color:#27500A">${presentN}</div><div style="font-size:10px">出席</div></div>
        <div style="text-align:center"><div style="font-size:15px;font-weight:500;color:#378ADD">${leaveN}</div><div style="font-size:10px">請假</div></div>
        <div style="text-align:center"><div style="font-size:15px;font-weight:500">${enrolled.length+mkStu.length}</div><div style="font-size:10px">名單</div></div>
      </div>
    </div>`;

  const buildRow = (stId, name, ageY, ageM, height, isMakeup=false) => {
    const cur = rec[stId] || '';
    if (isManual) {
      return `<div class="srow ${cur}" style="flex-wrap:wrap">
        <input type="checkbox" class="si-check" ${cur==='present'?'checked':''} onchange="manualCheck('${stId}',this.checked)">
        <div style="flex:1">
          <div style="font-size:12px;font-weight:500">${name}${isMakeup?' <span class="pill pill-purple" style="font-size:10px">補課</span>':''}</div>
          <div style="font-size:10px;color:#999">${fmtAge(ageY,ageM)}${height?' · '+height+'cm':''}</div>
        </div>
        <div style="display:flex;gap:3px;flex-wrap:wrap">
          <button class="sb ${cur==='present'?'sp':''}" onclick="siSetQuick('${stId}','present')">✓ 出席</button>
          <button class="sb ${cur==='leave'?'sl':''}" onclick="siSetQuick('${stId}','leave')">△ 請假</button>
          <button class="sb ${cur==='absent'?'sa':''}" onclick="siSetQuick('${stId}','absent')">✕ 缺席</button>
          <button class="sb" onclick="siSetQuick('${stId}','')" style="${cur?'':'opacity:.4'}">清除</button>
        </div>
        <div style="width:100%;font-size:10px;color:#666;padding-top:2px">
          目前狀態：${cur==='present'?'✓ 出席':cur==='leave'?'△ 請假':cur==='absent'?'✕ 缺席':'未記錄'}
        </div>
      </div>`;
    } else {
      return `<div class="srow ${cur}">
        <div style="flex:1">
          <div style="font-size:12px;font-weight:500">${name}${isMakeup?' <span class="pill pill-purple" style="font-size:10px">補課</span>':''}</div>
          <div style="font-size:10px;color:#999">${fmtAge(ageY,ageM)}${height?' · '+height+'cm':''}</div>
        </div>
        <div style="display:flex;gap:3px">
          <button class="sb ${cur==='present'?'sp':''}" onclick="setSI('${curSiKey}','${stId}','present','${termId}','${sessId}')">出席</button>
          <button class="sb ${cur==='leave'?'sl':''}" onclick="setSI('${curSiKey}','${stId}','leave','${termId}','${sessId}')">請假</button>
          <button class="sb ${cur==='absent'?'sa':''}" onclick="setSI('${curSiKey}','${stId}','absent','${termId}','${sessId}')">缺席</button>
        </div>
      </div>`;
    }
  };

  const rows = enrolled.map(e => {
    const st = getSt(e.studentId) || { name: e.studentName||'?', ageY:0, ageM:0, height:0 };
    return buildRow(e.studentId, st.name, st.ageY, st.ageM, st.height);
  }).join('') +
  mkStu.map(m => {
    const st = getSt(m.studentId);
    return buildRow(m.studentId, st.name, st.ageY, st.ageM, st.height, true);
  }).join('');

  document.getElementById('signin-body').innerHTML = statsBar + (rows || '<div class="empty">此班次尚無報名學生</div>');
}

function manualCheck(stId, checked) {
  if (!signinRec[curSiKey]) signinRec[curSiKey] = {};
  signinRec[curSiKey][stId] = checked ? 'present' : '';
  // re-render row status text without full re-render
  renderSignin();
}

function siSetQuick(stId, status) {
  if (!signinRec[curSiKey]) signinRec[curSiKey] = {};
  signinRec[curSiKey][stId] = status;
  renderSignin();
}

async function saveManualSignin() {
  showLoading('儲存簽到資料…');
  await saveSignin();
  hideLoading();
  hint('✓ 簽到已儲存至 Firebase');
  renderSignin();
}

async function saveSignin() {
  const batch = db.batch();
  Object.entries(signinRec).forEach(([key, val]) => {
    batch.set(db.collection('signin').doc(key), val);
  });
  await batch.commit();
}

// Keep original setSI for QR mode
async function setSI(key, stId, status, termId, sessId) {
  if (!signinRec[key]) signinRec[key] = {};
  const prev = signinRec[key][stId] || '';
  signinRec[key][stId] = status;
  const st = students.find(s=>s.id===stId);
  if (st) {
    if (prev==='present') st.attended = Math.max(0,(st.attended||0)-1);
    if (prev==='leave')   st.leaves   = Math.max(0,(st.leaves||0)-1);
    if (status==='present') st.attended = (st.attended||0)+1;
    if (status==='leave' && (st.leaves||0)<(st.leaveMax||2)) {
      st.leaves = (st.leaves||0)+1;
      await createMakeup(stId, sessId, termId, key.split('|')[1]);
    }
  }
  await saveSignin();
  await saveCol('students', students);
  renderSignin(); renderDash();
}

async function setMkSI(key, stId, mkId, status) {
  if (!signinRec[key]) signinRec[key] = {};
  signinRec[key][stId] = status;
  if (status==='present') {
    const m = makeupRec.find(x=>x.id===mkId);
    if (m) { m.status='done'; const st=students.find(s=>s.id===stId); if(st) st.makeups=Math.max(0,(st.makeups||0)-1); }
  }
  await saveSignin(); await saveCol('makeup',makeupRec); await saveCol('students',students);
  renderSignin();
}

function dlQR() { const c=document.getElementById('qr-cv'); if(!c)return; const a=document.createElement('a'); a.href=c.toDataURL('image/png'); a.download='QR簽到.png'; a.click(); }

function simScan(termId,sessId,date) {
  const enrolled=getEnrolled(termId,sessId);
  if(!enrolled.length){alert('此班次尚無學生');return;}
  const s=getSess(sessId);
  document.getElementById('mod-title').textContent='家長掃碼簽到';
  document.getElementById('mod-body').innerHTML=`<div class="info-box">模擬家長掃碼 · ${s?s.name:''} ${date}</div><div class="fr"><label>選擇孩子</label><select id="scan-stu">${enrolled.map(e=>{const st=getSt(e.studentId);return`<option value="${e.studentId}">${st.name}</option>`;}).join('')}</select></div><button class="btn btn-green" style="width:100%" onclick="confirmScan('${sessId}','${date}','${termId}')">確認簽到</button>`;
  document.getElementById('overlay').style.display='flex';
}

async function confirmScan(sessId,date,termId) {
  const stId=document.getElementById('scan-stu').value;
  const key=sessId+'|'+date;
  if(!signinRec[key]) signinRec[key]={};
  signinRec[key][stId]='present';
  const st=students.find(s=>s.id===stId); if(st) st.attended=(st.attended||0)+1;
  await saveSignin(); await saveCol('students',students);
  document.getElementById('mod-body').innerHTML=`<div style="text-align:center;padding:16px 0"><div style="font-size:48px">✅</div><div style="font-size:15px;font-weight:500;color:#27500A;margin-top:8px">簽到成功</div></div><button class="btn btn-outline" style="width:100%" onclick="closeMod()">關閉</button>`;
  renderSignin(); renderDash();
}

async function createMakeup(studentId,origSessId,termId,leaveDate,source='auto') {
  makeupRec.push({id:'mk'+Date.now()+Math.random().toString(36).slice(2,5),studentId,originalSessionId:origSessId,termId,leaveDate,makeupSessionId:null,makeupDate:null,status:'pending',source,createdAt:today()});
  const st=students.find(s=>s.id===studentId); if(st) st.makeups=(st.makeups||0)+1;
  await saveCol('makeup',makeupRec);
}

async function approveReg(pendingId) {
  const p = pendingSubs.find(x=>x.id===pendingId); if (!p) return;
  const t = terms.find(x=>x.id===p.termId);
  const sl = (p.sessionIds||[]).map(id=>getSess(id)).filter(Boolean);
  const fullSess = sl.filter(s=>t&&getEnrolled(t.id,s.id).length>=s.capacity);
  if (fullSess.length && !confirm(`${fullSess.map(s=>s.name).join('、')} 已滿班，確定繼續（加入候補）？`)) return;
  const st = {id:'s'+Date.now(),name:p.childName,parent:p.parentName,phone:p.phone,lineId:p.lineId,gender:p.gender,ageY:p.ageY,ageM:p.ageM,height:p.height,period:p.autoLessons||6,attended:0,leaves:0,makeups:0,leaveMax:2,startDate:today()};
  students.push(st);
  if (t) {
    sl.forEach(s=>{
      const cnt=getEnrolled(t.id,s.id).length;
      enrolls.push({id:'e'+Date.now()+Math.random().toString(36).slice(2,4),termId:p.termId,sessionId:s.id,studentId:st.id,status:cnt>=s.capacity?'waitlist':'enrolled',enrollDate:today(),createdAt:today()});
    });
  }
  p.status = 'approved';
  await saveCol('students',students); await saveCol('enrolls',enrolls); await saveCol('pending',pendingSubs);
  renderRegQR(); renderDash();
  alert(`✓ 已新增學生「${p.childName}」！`);
}

async function rejectReg(pendingId) {
  if (!confirm('確認拒絕此報名？')) return;
  pendingSubs = pendingSubs.filter(p=>p.id!==pendingId);
  await saveCol('pending', pendingSubs); renderRegQR();
}

function editPending(pendingId) {
  const p = pendingSubs.find(x=>x.id===pendingId); if (!p) return;
  const t = terms.find(x=>x.id===p.termId);
  const ts = t ? sessions.filter(s=>t.sessions&&t.sessions.includes(s.id)) : sessions;
  document.getElementById('mod-title').textContent = '編輯待審核資料';

function renderTermAttendance(termId) {
  const t = terms.find(x=>x.id===termId); if (!t) return;
  const sl = sessions.filter(s=>t.sessions&&t.sessions.includes(s.id)).sort((a,b)=>(DAY_ORDER[a.day]||9)-(DAY_ORDER[b.day]||9));
  const holidays = (t.holidays||[]).map(h=>h.date);
  const sessDates = t.sessionDates||{};

  document.getElementById('term-att-body').innerHTML = sl.map(s => {
    const v = getVenue(s.venueId);
    const enrolled = getEnrolled(termId, s.id);
    if (!enrolled.length) return `<div class="card"><div style="font-size:13px;font-weight:500;margin-bottom:4px">${s.name} · ${s.day} ${s.time}</div><div class="empty">尚無報名學生</div></div>`;

    const sd = sessDates[s.id] || {};
    const startD = new Date(sd.start||t.startDate);
    const endD   = new Date(sd.end||t.endDate);

    // Generate all lesson dates for this session's weekday
    const dayMap = {週一:1,週二:2,週三:3,週四:4,週五:5,週六:6,週日:0};
    const targetDay = dayMap[s.day];
    const lessonDates = [];
    const cur = new Date(startD);
    while (cur <= endD) {
      if (cur.getDay() === targetDay) {
        const ds = cur.toISOString().slice(0,10);
        if (!holidays.includes(ds)) lessonDates.push(ds);
      }
      cur.setDate(cur.getDate()+1);
    }
    // Limit to periodLessons
    const displayDates = lessonDates.slice(0, s.periodLessons);

    // Build attendance table
    const headerCells = displayDates.map((d,i)=>`<th title="${d}">${fmtD(d).slice(3)}<br><span style="font-size:9px;color:#999">${'第'+(i+1)+'堂'}</span></th>`).join('');
    const bodyRows = enrolled.map(e => {
      const st = getSt(e.studentId);
      const cells = displayDates.map(d => {
        const key = s.id+'|'+d;
        const rec = signinRec[key]||{};
        const status = rec[e.studentId]||'';
        const icon = status==='present'?'✓':status==='leave'?'△':status==='absent'?'✕':'·';
        const cls  = status==='present'?'present':status==='leave'?'leave':status==='absent'?'absent':'empty';
        return `<td><button class="att-dot ${cls}" title="${d} ${status||'未記錄'}" onclick="toggleAtt('${s.id}','${d}','${e.studentId}','${termId}','${s.id}')">${icon}</button></td>`;
      }).join('');
      const presentCount = displayDates.filter(d=>(signinRec[s.id+'|'+d]||{})[e.studentId]==='present').length;
      const leaveCount   = displayDates.filter(d=>(signinRec[s.id+'|'+d]||{})[e.studentId]==='leave').length;
      return `<tr>
        <td style="text-align:left;white-space:nowrap;font-weight:500">${st.name}</td>
        ${cells}
        <td><span style="font-size:11px;color:#27500A">${presentCount}出</span>/<span style="font-size:11px;color:#378ADD">${leaveCount}假</span></td>
      </tr>`;
    }).join('');

    return `<div class="card" style="${v?'border-top:2px solid '+v.color:''}">
      <div style="display:flex;align-items:center;gap:7px;margin-bottom:8px">
        ${v?`<span style="font-size:10px;padding:2px 6px;border-radius:5px;color:#fff;background:${v.color}">${v.shortName}</span>`:''}
        <span class="badge ${s.type}">${tLabel(s.type)}</span>
        <span style="font-size:13px;font-weight:500">${s.name}</span>
        <span style="font-size:11px;color:#999">${s.day} ${s.time} · ${s.coach}</span>
        ${sd.start?`<span class="session-date-chip">📅 ${fmtD(sd.start)}—${fmtD(sd.end)}</span>`:''}
        <span style="font-size:11px;color:#666;margin-left:auto">${displayDates.length}/${s.periodLessons} 堂</span>
      </div>
      ${holidays.length?`<div style="font-size:10px;color:#BA7517;margin-bottom:6px">🚫 本期休課：${holidays.map(h=>`<span class="holiday-tag">${fmtD(h)}</span>`).join('')}</div>`:''}
      <div style="overflow-x:auto">
        <table class="att-table">
          <thead><tr>
            <th style="text-align:left;min-width:70px">學生</th>
            ${headerCells}
            <th>統計</th>
          </tr></thead>
          <tbody>${bodyRows}</tbody>
        </table>
      </div>
      <div style="font-size:10px;color:#999;margin-top:6px;display:flex;gap:12px">
        <span><span class="att-dot present" style="width:16px;height:16px;font-size:9px">✓</span> 出席</span>
        <span><span class="att-dot leave" style="width:16px;height:16px;font-size:9px">△</span> 請假</span>
        <span><span class="att-dot absent" style="width:16px;height:16px;font-size:9px">✕</span> 缺席</span>
        <span><span class="att-dot empty" style="width:16px;height:16px;font-size:9px">·</span> 未記錄</span>
        <span style="margin-left:auto">點擊格子可切換出席狀態</span>
      </div>
    </div>`;
  }).join('') || '<div class="empty">此期別無班次或無學生</div>';
}

async function toggleAtt(sessId, date, stId, termId, origSessId) {
  const key = sessId+'|'+date;
  if (!signinRec[key]) signinRec[key] = {};
  const cur = signinRec[key][stId]||'';
  // cycle: '' → present → leave → absent → ''
  const next = cur===''?'present':cur==='present'?'leave':cur==='leave'?'absent':'';
  signinRec[key][stId] = next;
  // Update student stats
  const st = students.find(s=>s.id===stId);
  if (st) {
    if (cur==='present') st.attended = Math.max(0,(st.attended||0)-1);
    if (next==='present') st.attended = (st.attended||0)+1;
    if (cur==='leave')   st.leaves   = Math.max(0,(st.leaves||0)-1);
    if (next==='leave'&&(st.leaves||0)<(st.leaveMax||2)) {
      st.leaves=(st.leaves||0)+1;
      await createMakeup(stId, origSessId, termId, date);
    }
  }
  await saveSignin();
  if (st) await saveCol('students', students);
  // re-render attendance panel
  renderTermAttendance(termId);
}

      return acc;

    }, 0);

function getCFData() {
  return {
    name:   document.getElementById('cf-name').value.trim(),
    role:   document.getElementById('cf-role').value.trim()||'教練',
    phone:  document.getElementById('cf-phone').value.trim(),
    color:  document.getElementById('cf-color').value,
    note:   document.getElementById('cf-note').value.trim(),
    active: document.getElementById('cf-active').value==='true'
  };
}
async function createCoach() {
  const d=getCFData(); if(!d.name){alert('請填寫姓名');return;}
  coaches.push({id:'c'+Date.now(),...d});
  await saveCol('coaches',coaches); closeMod(); renderCoaches();
}
async function saveCoach(id) {
  const d=getCFData(); if(!d.name){alert('請填寫姓名');return;}
  const i=coaches.findIndex(c=>c.id===id); if(i>=0) coaches[i]={...coaches[i],...d};
  await saveCol('coaches',coaches); closeMod(); renderCoaches();
}
async function deleteCoach(id) {
  const c=coaches.find(x=>x.id===id); if(!c) return;
  if(!confirm(`確認刪除「${c.name}」？相關班次的教練名稱不會自動變更。`)) return;
  coaches=coaches.filter(x=>x.id!==id);
  await saveCol('coaches',coaches); closeMod(); renderCoaches();
}

let currentReportType = 'att';

function showReport(type, btn) {
  currentReportType = type;
  if(btn) { document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); }
  const body = document.getElementById('report-body');
  if (!body) return;
  switch(type) {
    case 'att':        renderReportAtt(body); break;
    case 'term-enroll':renderReportTermEnroll(body); break;
    case 'reg-hours':  renderReportRegHours(body); break;
    case 'fee-range':  renderReportFeeRange(body); break;
  }
}

// ── Shared filter builder ──────────────────────────
function buildFilterHTML(id, extras='') {
  const coachOpts = ['<option value="">全部教練</option>',...coaches.filter(c=>c.active).map(c=>`<option value="${c.name}">${c.name}</option>`)].join('');
  const sessOpts  = ['<option value="">全部課程</option>',...sessions.sort((a,b)=>a.name.localeCompare(b.name)).map(s=>`<option value="${s.id}">${s.name} · ${s.day} ${s.time}</option>`)].join('');
  const termOpts  = ['<option value="">全部期別</option>',...terms.sort((a,b)=>a.startDate.localeCompare(b.startDate)).map(t=>`<option value="${t.id}">${t.name}</option>`)].join('');
  const yr=new Date().getFullYear();
  return `<div class="report-filter">
    <div class="fr"><label>開始日期</label><input type="date" id="${id}-from" value="${yr}-01-01"></div>
    <div class="fr"><label>結束日期</label><input type="date" id="${id}-to" value="${yr}-12-31"></div>
    <div class="fr"><label>教練</label><select id="${id}-coach">${coachOpts}</select></div>
    <div class="fr"><label>課程</label><select id="${id}-sess">${sessOpts}</select></div>
    ${extras}
    <button class="btn btn-blue" onclick="showReport('${currentReportType}',null)" style="align-self:flex-end">查詢</button>
  </div>`;
}

// ── ① Attendance (signed-in) report ───────────────
function renderReportAtt(body) {
  body.innerHTML = buildFilterHTML('att') + '<div id="att-result"></div>';
  // auto-run
  calcReportAtt();
}

function calcReportAtt() {
  const from  = document.getElementById('att-from')?.value||'';
  const to    = document.getElementById('att-to')?.value||'';
  const coachF= document.getElementById('att-coach')?.value||'';
  const sessF = document.getElementById('att-sess')?.value||'';

  // Gather all sign-in records in range
  const rows = []; // {coachName, sessId, sessName, date, presentCount}
  Object.entries(signinRec).forEach(([key, rec]) => {
    const [sessId, date] = key.split('|');
    if (from && date < from) return;
    if (to   && date > to)   return;
    const s = getSess(sessId); if (!s) return;
    if (coachF && s.coach !== coachF) return;
    if (sessF  && sessId  !== sessF)  return;
    const present = Object.values(rec).filter(v=>v==='present').length;
    const leave   = Object.values(rec).filter(v=>v==='leave').length;
    rows.push({ coach:s.coach, sessId, sessName:s.name+' '+s.day+' '+s.time, date, present, leave });
  });

  // Group by coach → session
  const byCoach = {};
  rows.forEach(r => {
    if(!byCoach[r.coach]) byCoach[r.coach]={coach:r.coach,sessions:{},totalPresent:0,totalLeave:0};
    const g = byCoach[r.coach];
    if(!g.sessions[r.sessId]) g.sessions[r.sessId]={name:r.sessName,present:0,leave:0,dates:[]};
    g.sessions[r.sessId].present += r.present;
    g.sessions[r.sessId].leave   += r.leave;
    g.sessions[r.sessId].dates.push(r.date);
    g.totalPresent += r.present;
    g.totalLeave   += r.leave;
  });

  const totalPresent = Object.values(byCoach).reduce((a,b)=>a+b.totalPresent,0);
  const totalLeave   = Object.values(byCoach).reduce((a,b)=>a+b.totalLeave,0);

  if (!Object.keys(byCoach).length) {
    document.getElementById('att-result').innerHTML='<div class="empty">此區間無出席簽到資料</div>';
    return;
  }

  const statsHTML = `<div class="report-stat-grid">
    <div class="report-stat"><div class="report-stat-val" style="color:#27500A">${totalPresent}</div><div class="report-stat-lbl">總出席人次</div></div>
    <div class="report-stat"><div class="report-stat-val" style="color:#378ADD">${totalLeave}</div><div class="report-stat-lbl">總請假人次</div></div>
    <div class="report-stat"><div class="report-stat-val">${Object.keys(byCoach).length}</div><div class="report-stat-lbl">授課教練數</div></div>
    <div class="report-stat"><div class="report-stat-val">${rows.reduce((a,b)=>a+b.present+b.leave,0)}</div><div class="report-stat-lbl">總記錄人次</div></div>
  </div>`;

  const tableRows = Object.values(byCoach).flatMap(g => {
    const co = getCoach(g.coach)||{color:'#888'};
    const sessList = Object.values(g.sessions);
    return sessList.map((ss, i) => `<tr>
      ${i===0?`<td rowspan="${sessList.length}" style="font-weight:500;vertical-align:middle"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${co.color};margin-right:5px"></span>${g.coach}</td>`:''}
      <td>${ss.name}</td>
      <td>${ss.dates.length} 堂</td>
      <td style="font-weight:500;color:#27500A">${ss.present}</td>
      <td style="color:#378ADD">${ss.leave}</td>
      <td>${ss.present+ss.leave}</td>
    </tr>`);
  }).join('') + `<tr class="report-table tfoot">
    <td colspan="2"><b>合計</b></td><td></td>
    <td style="font-weight:600;color:#27500A">${totalPresent}</td>
    <td style="color:#378ADD">${totalLeave}</td>
    <td style="font-weight:600">${totalPresent+totalLeave}</td>
  </tr>`;

  document.getElementById('att-result').innerHTML = statsHTML + `
    <div style="overflow-x:auto"><table class="report-table">
      <thead><tr><th>教練</th><th>課程班次</th><th>授課堂數</th><th>出席人次</th><th>請假人次</th><th>總計人次</th></tr></thead>
      <tbody>${tableRows}</tbody>
    </table></div>`;
}

// ── ② Term enrollment report ──────────────────────
function renderReportTermEnroll(body) {
  const termOpts=['<option value="">全部期別</option>',...terms.sort((a,b)=>a.startDate.localeCompare(b.startDate)).map(t=>`<option value="${t.id}">${t.name}</option>`)].join('');
  body.innerHTML = buildFilterHTML('te',`<div class="fr"><label>期別</label><select id="te-term">${termOpts}</select></div>`) + '<div id="te-result"></div>';
  calcReportTE();
}

function calcReportTE() {
  const from   = document.getElementById('te-from')?.value||'';
  const to     = document.getElementById('te-to')?.value||'';
  const coachF = document.getElementById('te-coach')?.value||'';
  const sessF  = document.getElementById('te-sess')?.value||'';
  const termF  = document.getElementById('te-term')?.value||'';

  let termList = terms.filter(t=>{
    if(from && t.endDate   < from) return false;
    if(to   && t.startDate > to)   return false;
    if(termF && t.id !== termF) return false;
    return true;
  }).sort((a,b)=>a.startDate.localeCompare(b.startDate));

  const allRows = [];
  termList.forEach(t => {
    const sl = sessions.filter(s=>t.sessions&&t.sessions.includes(s.id)&&(!coachF||s.coach===coachF)&&(!sessF||s.id===sessF));
    sl.forEach(s => {
      const enrolled = getEnrolled(t.id,s.id).length;
      const waitlist = getWait(t.id,s.id).length;
      allRows.push({ term:t.name, termStart:t.startDate, sessName:s.name+' '+s.day+' '+s.time, coach:s.coach, capacity:s.capacity, enrolled, waitlist, fillRate:Math.round(enrolled/s.capacity*100) });
    });
  });

  const totalEnrolled = allRows.reduce((a,b)=>a+b.enrolled,0);
  const totalCapacity = allRows.reduce((a,b)=>a+b.capacity,0);
  const avgFill = totalCapacity?Math.round(totalEnrolled/totalCapacity*100):0;

  if (!allRows.length) { document.getElementById('te-result').innerHTML='<div class="empty">此區間無報名資料</div>'; return; }

  document.getElementById('te-result').innerHTML = `
    <div class="report-stat-grid">
      <div class="report-stat"><div class="report-stat-val" style="color:#27500A">${totalEnrolled}</div><div class="report-stat-lbl">總報名人數</div></div>
      <div class="report-stat"><div class="report-stat-val">${totalCapacity}</div><div class="report-stat-lbl">總班位數</div></div>
      <div class="report-stat"><div class="report-stat-val" style="color:${avgFill>=80?'#A32D2D':'#27500A'}">${avgFill}%</div><div class="report-stat-lbl">平均報滿率</div></div>
      <div class="report-stat"><div class="report-stat-val">${allRows.length}</div><div class="report-stat-lbl">班次總數</div></div>
    </div>
    <div style="overflow-x:auto"><table class="report-table">
      <thead><tr><th>期別</th><th>課程班次</th><th>教練</th><th>滿班人數</th><th>報名</th><th>候補</th><th>報滿率</th></tr></thead>
      <tbody>${allRows.map(r=>`<tr>
        <td style="white-space:nowrap">${r.term}</td>
        <td>${r.sessName}</td>
        <td>${r.coach}</td>
        <td style="text-align:center">${r.capacity}</td>
        <td style="text-align:center;font-weight:500;color:#27500A">${r.enrolled}</td>
        <td style="text-align:center;color:#BA7517">${r.waitlist||0}</td>
        <td style="text-align:center"><span style="font-size:11px;padding:2px 7px;border-radius:8px;background:${r.fillRate>=100?'#FCEBEB':r.fillRate>=80?'#FAEEDA':'#EAF3DE'};color:${r.fillRate>=100?'#501313':r.fillRate>=80?'#412402':'#27500A'}">${r.fillRate}%</span></td>
      </tr>`).join('')}
      <tr style="font-weight:600;background:#f0f0f0"><td colspan="3">合計</td><td style="text-align:center">${totalCapacity}</td><td style="text-align:center;color:#27500A">${totalEnrolled}</td><td style="text-align:center">${allRows.reduce((a,b)=>a+(b.waitlist||0),0)}</td><td style="text-align:center">${avgFill}%</td></tr>
      </tbody>
    </table></div>`;
}

// ── ③ Registered lesson-hours report ─────────────
function renderReportRegHours(body) {
  body.innerHTML = buildFilterHTML('rh') + '<div id="rh-result"></div>';
  calcReportRH();
}

function calcReportRH() {
  const from   = document.getElementById('rh-from')?.value||'';
  const to     = document.getElementById('rh-to')?.value||'';
  const coachF = document.getElementById('rh-coach')?.value||'';
  const sessF  = document.getElementById('rh-sess')?.value||'';

  // For each term x session combination in range, compute enrolled * periodLessons
  const rows = [];
  terms.forEach(t => {
    if(from && t.endDate   < from) return;
    if(to   && t.startDate > to)   return;
    sessions.filter(s=>t.sessions&&t.sessions.includes(s.id)&&(!coachF||s.coach===coachF)&&(!sessF||s.id===sessF)).forEach(s=>{
      const enrolled = getEnrolled(t.id,s.id).length;
      const totalHours = enrolled * s.periodLessons;
      rows.push({term:t.name,sessName:s.name+' '+s.day+' '+s.time,coach:s.coach,enrolled,periodLessons:s.periodLessons,totalHours});
    });
  });

  const totalEnrolled = rows.reduce((a,b)=>a+b.enrolled,0);
  const totalHours    = rows.reduce((a,b)=>a+b.totalHours,0);

  if(!rows.length){document.getElementById('rh-result').innerHTML='<div class="empty">此區間無報名人堂數資料</div>';return;}

  document.getElementById('rh-result').innerHTML=`
    <div class="report-stat-grid">
      <div class="report-stat"><div class="report-stat-val" style="color:#7F77DD">${totalHours}</div><div class="report-stat-lbl">總報名人堂數</div></div>
      <div class="report-stat"><div class="report-stat-val" style="color:#27500A">${totalEnrolled}</div><div class="report-stat-lbl">總報名人數</div></div>
      <div class="report-stat"><div class="report-stat-val">${rows.length}</div><div class="report-stat-lbl">班次數</div></div>
      <div class="report-stat"><div class="report-stat-val">${rows.length?Math.round(totalHours/rows.length):0}</div><div class="report-stat-lbl">平均每班人堂數</div></div>
    </div>
    <div style="overflow-x:auto"><table class="report-table">
      <thead><tr><th>期別</th><th>課程班次</th><th>教練</th><th>報名人數</th><th>每期堂數</th><th>報名人堂數</th></tr></thead>
      <tbody>${rows.map(r=>`<tr>
        <td style="white-space:nowrap">${r.term}</td>
        <td>${r.sessName}</td>
        <td>${r.coach}</td>
        <td style="text-align:center">${r.enrolled}</td>
        <td style="text-align:center">${r.periodLessons}</td>
        <td style="text-align:center;font-weight:600;color:#7F77DD">${r.totalHours}</td>
      </tr>`).join('')}
      <tr style="font-weight:600;background:#f0f0f0"><td colspan="3">合計</td><td style="text-align:center">${totalEnrolled}</td><td></td><td style="text-align:center;color:#7F77DD">${totalHours}</td></tr>
      </tbody>
    </table></div>`;
}

function calcReportFee() {
  const from   = document.getElementById('fr-from')?.value||'';
  const to     = document.getElementById('fr-to')?.value||'';
  const termF  = document.getElementById('fr-term')?.value||'';
  const stF    = document.getElementById('fr-status')?.value||'';

  let list = fees.filter(f=>{
    if(from && (f.issuedDate||'') < from) return false;
    if(to   && (f.issuedDate||'') > to)   return false;
    if(termF && f.termId !== termF) return false;
    return true;
  });

  // Apply status filter
  list = list.filter(f=>{
    const s = feeStatus(f);
    if(stF==='paid')     return s.bal<=0 && !s.refunded;
    if(stF==='unpaid')   return s.bal>0  && !s.refunded;
    if(stF==='overdue')  return s.label==='逾期';
    if(stF==='refunded') return s.refunded;
    return true;
  });

  const totalAmt     = list.reduce((a,f)=>a+f.amount,0);
  const totalPaid    = list.reduce((a,f)=>a+feeStatus(f).paid,0);
  const totalUnpaid  = list.reduce((a,f)=>a+feeStatus(f).bal,0);
  const totalRefund  = list.filter(f=>f.status==='refunded').length;

  if(!list.length){document.getElementById('fr-result').innerHTML='<div class="empty">此區間無學費資料</div>';return;}

  document.getElementById('fr-result').innerHTML=`
    <div class="report-stat-grid">
      <div class="report-stat"><div class="report-stat-val">${fmt(totalAmt)}</div><div class="report-stat-lbl">總開帳金額</div></div>
      <div class="report-stat"><div class="report-stat-val" style="color:#27500A">${fmt(totalPaid)}</div><div class="report-stat-lbl">已收款</div></div>
      <div class="report-stat"><div class="report-stat-val" style="color:${totalUnpaid>0?'#A32D2D':'inherit'}">${fmt(totalUnpaid)}</div><div class="report-stat-lbl">未收款</div></div>
      <div class="report-stat"><div class="report-stat-val">${list.length}</div><div class="report-stat-lbl">帳單筆數</div></div>
    </div>
    <div style="overflow-x:auto"><table class="report-table">
      <thead><tr><th>開帳日期</th><th>學生</th><th>期別</th><th>課程說明</th><th>金額</th><th>已繳</th><th>餘額</th><th>狀態</th></tr></thead>
      <tbody>${list.sort((a,b)=>(a.issuedDate||'').localeCompare(b.issuedDate||'')).map(f=>{
        const s=feeStatus(f); const st=getSt(f.studentId); const t=terms.find(x=>x.id===f.termId);
        return`<tr>
          <td style="white-space:nowrap">${fmtD(f.issuedDate)}</td>
          <td style="font-weight:500">${st.name}</td>
          <td style="white-space:nowrap">${t?t.name:'—'}</td>
          <td>${f.description||'—'}</td>
          <td style="text-align:right">${fmt(f.amount)}</td>
          <td style="text-align:right;color:#27500A">${fmt(s.paid)}</td>
          <td style="text-align:right;color:${s.bal>0?'#A32D2D':'#999'}">${s.bal>0?fmt(s.bal):'—'}</td>
          <td><span class="pill ${s.cls}">${s.label}</span></td>

function feeQuickFilter() {
  const from = document.getElementById('fee-quick-from')?.value||'';
  const to   = document.getElementById('fee-quick-to')?.value||'';
  const tF   = document.getElementById('fee-term-filter')?.value||'all';
  const sF   = document.getElementById('fee-status-filter')?.value||'all';
  let list   = fees;
  if(from) list = list.filter(f=>(f.issuedDate||f.dueDate||'') >= from);
  if(to)   list = list.filter(f=>(f.issuedDate||f.dueDate||'') <= to);
  if(tF!=='all') list=list.filter(f=>f.termId===tF);
  const ws=list.map(f=>({f,s:feeStatus(f)}));
  let filtered=ws;
  if(sF==='unpaid')   filtered=ws.filter(({s})=>s.bal>0&&!s.refunded);
  else if(sF==='paid')     filtered=ws.filter(({s})=>s.bal<=0&&!s.refunded);
  else if(sF==='overdue')  filtered=ws.filter(({s})=>s.label==='逾期');
  else if(sF==='refunded') filtered=ws.filter(({s})=>s.refunded);
  list=filtered.map(({f})=>f);
  const ti=list.reduce((a,f)=>a+f.amount,0);
  const tp=list.filter(f=>f.status!=='refunded').reduce((a,f)=>a+feeStatus(f).paid,0);
  const tw=list.filter(f=>f.status!=='refunded').reduce((a,f)=>a+feeStatus(f).bal,0);
  // Show stats
  const statsEl = document.getElementById('fee-metrics');
  if(statsEl) statsEl.innerHTML=`<div class="mc"><div class="mc-lbl">篩選結果（${list.length}筆）</div><div class="mc-val">${fmt(ti)}</div></div><div class="mc"><div class="mc-lbl">已收款</div><div class="mc-val" style="color:#27500A">${fmt(tp)}</div></div><div class="mc"><div class="mc-lbl">未收款</div><div class="mc-val" style="color:${tw>0?'#A32D2D':'inherit'}">${fmt(tw)}</div></div>`;
  // Render filtered bills
  const body=document.getElementById('fee-body');
  if(body) renderBills(list);
}

  body.innerHTML = coaches.map(c => {
    const sessCount = sessions.filter(s=>s.coach===c.name).length;

    // Monthly: count as "effective coach" (substitute if set, else original)
    const monthPresent = Object.entries(signinRec).reduce((acc,[key,rec])=>{
      const [sessId, date] = key.split('|');
      if (!date||!date.startsWith(thisMonth)) return acc;
      const s = getSess(sessId); if (!s) return acc;
      const effectiveCoach = rec._substituteCoach || s.coach;
      if (effectiveCoach === c.name)
        acc += Object.values(rec).filter(v=>v==='present').length;
      return acc;
    }, 0);

    // Monthly as sub (代課)
    const monthAsSub = Object.entries(signinRec).reduce((acc,[key,rec])=>{
      const [sessId, date] = key.split('|');
      if (!date||!date.startsWith(thisMonth)) return acc;
      const s = getSess(sessId); if (!s) return acc;
      if (rec._substituteCoach === c.name)
        acc += Object.values(rec).filter(v=>v==='present').length;
      return acc;
    }, 0);

    // Total all-time (effective coach)
    const totalPresent = Object.entries(signinRec).reduce((acc,[key,rec])=>{
      const sessId = key.split('|')[0];
      const s = getSess(sessId); if (!s) return acc;
      const effectiveCoach = rec._substituteCoach || s.coach;
      if (effectiveCoach === c.name)
        acc += Object.values(rec).filter(v=>v==='present').length;
      return acc;
    }, 0);

    const coachColor = c.color || '#888';
    return `<div class="coach-card">
      <div class="coach-avatar" style="background:${coachColor}20;color:${coachColor}">${c.name[0]}</div>
      <div style="flex:1">

          <span style="color:#aaa;font-size:10px">累計：${totalPresent}</span>
        </div>

      </div>

// ── Override report ① to use effective coach ──────────────────────────────
function calcReportAtt() {
  const from   = document.getElementById('att-from')?.value||'';
  const to     = document.getElementById('att-to')?.value||'';
  const coachF = document.getElementById('att-coach')?.value||'';
  const sessF  = document.getElementById('att-sess')?.value||'';

  const rows = [];
  Object.entries(signinRec).forEach(([key, rec]) => {
    const [sessId, date] = key.split('|');
    if (!date) return;
    if (from && date < from) return;
    if (to   && date > to)   return;
    const s = getSess(sessId); if (!s) return;

    // Effective coach = substitute if present, else original
    const effectiveCoach = rec._substituteCoach || s.coach;
    const isSubstitute   = !!rec._substituteCoach;

    if (coachF && effectiveCoach !== coachF) return;
    if (sessF  && sessId !== sessF) return;

    const present = Object.values(rec).filter(v=>v==='present'&&v!=='_substituteCoach').length;
    const leave   = Object.values(rec).filter(v=>v==='leave').length;
    if (present+leave === 0) return;

    rows.push({
      coach: effectiveCoach,
      origCoach: s.coach,
      isSubstitute,
      sessId,
      sessName: s.name+' '+s.day+' '+s.time,
      date, present, leave
    });
  });

  // Group by effectiveCoach → session
  const byCoach = {};
  rows.forEach(r => {
    if (!byCoach[r.coach]) byCoach[r.coach]={coach:r.coach,sessions:{},totalPresent:0,totalLeave:0,subDates:[]};
    const g = byCoach[r.coach];
    if (!g.sessions[r.sessId]) g.sessions[r.sessId]={name:r.sessName,present:0,leave:0,dates:[],subDates:[]};
    g.sessions[r.sessId].present += r.present;
    g.sessions[r.sessId].leave   += r.leave;
    g.sessions[r.sessId].dates.push(r.date);
    if (r.isSubstitute) g.sessions[r.sessId].subDates.push(r.date);
    g.totalPresent += r.present;
    g.totalLeave   += r.leave;
    if (r.isSubstitute) g.subDates.push(r.date);
  });

  const totalPresent = Object.values(byCoach).reduce((a,b)=>a+b.totalPresent,0);
  const totalLeave   = Object.values(byCoach).reduce((a,b)=>a+b.totalLeave,0);
  const totalSubDates= Object.values(byCoach).reduce((a,b)=>a+b.subDates.length,0);

  if (!Object.keys(byCoach).length) {
    document.getElementById('att-result').innerHTML='<div class="empty">此區間無出席簽到資料</div>';
    return;
  }

  const statsHTML = `<div class="report-stat-grid">
    <div class="report-stat"><div class="report-stat-val" style="color:#27500A">${totalPresent}</div><div class="report-stat-lbl">總出席人次</div></div>
    <div class="report-stat"><div class="report-stat-val" style="color:#378ADD">${totalLeave}</div><div class="report-stat-lbl">總請假人次</div></div>
    <div class="report-stat"><div class="report-stat-val">${Object.keys(byCoach).length}</div><div class="report-stat-lbl">授課教練數</div></div>
    <div class="report-stat"><div class="report-stat-val" style="color:#BA7517">${totalSubDates}</div><div class="report-stat-lbl">代課堂次</div></div>
  </div>`;

  const tableRows = Object.values(byCoach).flatMap(g => {
    const co = getCoach(g.coach)||coaches.find(c=>c.name===g.coach)||{color:'#888'};
    const sessList = Object.values(g.sessions);
    return sessList.map((ss, i) => {
      const subNote = ss.subDates.length ? `<span style="font-size:10px;color:#BA7517;margin-left:4px">（含代課 ${ss.subDates.length} 堂）</span>` : '';
      return `<tr>
        ${i===0?`<td rowspan="${sessList.length}" style="font-weight:500;vertical-align:middle">
          <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${co.color||'#888'};margin-right:5px"></span>${g.coach}
          ${g.subDates.length?`<div style="font-size:10px;color:#BA7517">代課 ${g.subDates.length} 堂</div>`:''}
        </td>`:''}
        <td>${ss.name}${subNote}</td>
        <td>${ss.dates.length} 堂</td>
        <td style="font-weight:500;color:#27500A">${ss.present}</td>
        <td style="color:#378ADD">${ss.leave}</td>
        <td>${ss.present+ss.leave}</td>
      </tr>`;
    });
  }).join('') + `<tr style="font-weight:600;background:#f0f0f0">
    <td colspan="2"><b>合計</b></td><td></td>
    <td style="font-weight:600;color:#27500A">${totalPresent}</td>
    <td style="color:#378ADD">${totalLeave}</td>
    <td style="font-weight:600">${totalPresent+totalLeave}</td>
  </tr>`;

  document.getElementById('att-result').innerHTML = statsHTML + `
    <div style="font-size:11px;color:#BA7517;margin-bottom:8px;padding:6px 10px;background:#FAEEDA;border-radius:8px">
      ℹ️ 代課統計：當天設有代課教練時，出席人次歸入代課教練，不計入原教練。
    </div>
    <div style="overflow-x:auto"><table class="report-table">
      <thead><tr><th>教練（實際授課）</th><th>課程班次</th><th>授課堂數</th><th>出席人次</th><th>請假人次</th><th>總計</th></tr></thead>
      <tbody>${tableRows}</tbody>
    </table></div>`;
}

    if(isExt) { if(input)input.value=sub; if(sel)sel.value=''; }
    else      { if(sel)sel.value=sub;   if(input)input.value=''; }
    if(feeEl) feeEl.value=fee||'';
    showSubCoachConfirmed(sub, fee, isExt);
  } else {
    if(sel)sel.value=''; if(input&&!input.value)input.value=''; if(feeEl)feeEl.value='';
    hideSubCoachConfirmed();
  }
}

function onSubCoachSelChange() {
  const sel = document.getElementById('sub-coach-sel');
  if(sel&&sel.value) {
    const input = document.getElementById('sub-coach-input');
    if(input) input.value=''; // clear free text if list selected
  }
}

function onSubCoachInputChange() {
  const input = document.getElementById('sub-coach-input');
  if(input&&input.value.trim()) {
    const sel = document.getElementById('sub-coach-sel');
    if(sel) sel.value=''; // clear list if free text typed
  }
}

async function saveSubCoach() {
  const sel     = document.getElementById('sub-coach-sel');
  const input   = document.getElementById('sub-coach-input');
  const feeEl   = document.getElementById('sub-coach-fee');
  const selVal  = sel?sel.value:'';
  const inputVal= input?input.value.trim():'';
  const subName = selVal || inputVal;
  const subFee  = parseFloat(feeEl?.value)||0;
  const isExt   = !selVal && !!inputVal;

  if(!subName) { clearSubCoach(); return; }
  if(!curSiKey) return;
  if(!signinRec[curSiKey]) signinRec[curSiKey]={};

  signinRec[curSiKey]._substituteCoach     = subName;
  signinRec[curSiKey]._substituteFee       = subFee;
  signinRec[curSiKey]._substituteIsExternal= isExt;

  // Log to subLog for history
  const s=getSess(curSiSessId);
  const [,date]=curSiKey.split('|');
  const existing=subLog.findIndex(x=>x.sessId===curSiSessId&&x.date===date);
  const entry={id:'sl'+Date.now(),sessId:curSiSessId,date,
    origCoach:s?s.coach:'',subCoach:subName,subFee,isExternal:isExt,
    sessName:s?s.name+' '+s.day+' '+s.time:'',createdAt:today()};
  if(existing>=0) subLog[existing]=entry; else subLog.push(entry);

  await saveSignin();
  await saveCol('sublog',subLog);
  showSubCoachConfirmed(subName, subFee, isExt);
  hint('代課教練已設定 ✓');
}

async function clearSubCoach() {
  if(!curSiKey) return;
  if(signinRec[curSiKey]) {
    delete signinRec[curSiKey]._substituteCoach;
    delete signinRec[curSiKey]._substituteFee;
    delete signinRec[curSiKey]._substituteIsExternal;
  }
  const sel=document.getElementById('sub-coach-sel');const input=document.getElementById('sub-coach-input');const feeEl=document.getElementById('sub-coach-fee');
  if(sel)sel.value=''; if(input)input.value=''; if(feeEl)feeEl.value='';
  // Remove from subLog
  const [,date]=curSiKey.split('|');
  subLog=subLog.filter(x=>!(x.sessId===curSiSessId&&x.date===date));
  await saveSignin(); await saveCol('sublog',subLog);
  hideSubCoachConfirmed(); hint('代課已清除');
}

function showSubCoachConfirmed(name, fee, isExt) {
  const badge = document.getElementById('sub-coach-badge');
  const conf  = document.getElementById('sub-coach-confirmed');
  const nameEl= document.getElementById('sub-coach-confirmed-name');
  const feeEl = document.getElementById('sub-coach-confirmed-fee');
  if(badge){badge.style.display='inline-block';badge.textContent='代課：'+name+(isExt?' (外部)':'');}
  if(conf){conf.style.display='flex';}
  if(nameEl)nameEl.textContent=name+(isExt?' （外部臨時教練）':'');
  if(feeEl)feeEl.textContent=fee>0?'  代課費：NT$'+fee.toLocaleString():'';
}
function hideSubCoachConfirmed() {
  const badge=document.getElementById('sub-coach-badge');
  const conf=document.getElementById('sub-coach-confirmed');
  if(badge)badge.style.display='none';
  if(conf)conf.style.display='none';
}

// ── Coach card: monthly & substitute stats ────────────────────────
function renderCoaches() {
  const body=document.getElementById('coaches-body');
  if(!coaches.length){body.innerHTML='<div class="empty">尚無教練資料</div>';return;}
  const now=new Date();
  const thisMonth=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  body.innerHTML=coaches.map(c=>{
    const sessCount=sessions.filter(s=>s.coach===c.name).length;
    // Month: count as effective coach (sub overrides original)
    let monthPresent=0,monthAsOrig=0,monthAsSub=0;
    Object.entries(signinRec).forEach(([key,rec])=>{
      const[sessId,date]=key.split('|');
      if(!date||!date.startsWith(thisMonth))return;
      const s=getSess(sessId);if(!s)return;
      const eff=rec._substituteCoach||s.coach;
      const cnt=Object.entries(rec).filter(([k,v])=>k!=='_substituteCoach'&&k!=='_substituteFee'&&k!=='_substituteIsExternal'&&v==='present').length;
      if(eff===c.name){monthPresent+=cnt;}
      if(s.coach===c.name&&!rec._substituteCoach){monthAsOrig+=cnt;}
      if(rec._substituteCoach===c.name){monthAsSub+=cnt;}
    });
    // Month sub count from subLog
    const monthSubCount=subLog.filter(x=>x.date&&x.date.startsWith(thisMonth)&&x.subCoach===c.name).length;
    // Total all-time
    const totalPresent=Object.entries(signinRec).reduce((acc,[key,rec])=>{
      const sessId=key.split('|')[0];const s=getSess(sessId);if(!s)return acc;
      const eff=rec._substituteCoach||s.coach;
      if(eff===c.name)acc+=Object.entries(rec).filter(([k,v])=>k!=='_substituteCoach'&&k!=='_substituteFee'&&k!=='_substituteIsExternal'&&v==='present').length;
      return acc;
    },0);
    // Total sub times
    const totalSubCount=subLog.filter(x=>x.subCoach===c.name).length;
    const coachColor=c.color||'#888';
    return`<div class="coach-card">
      <div class="coach-avatar" style="background:${coachColor}20;color:${coachColor}">${c.name[0]}</div>
      <div style="flex:1">
        <div style="font-size:14px;font-weight:500">${c.name}
          <span class="pill ${c.active?'pill-green':'pill-gray'}" style="font-size:10px">${c.active?'授課中':'停用'}</span>
        </div>
        <div style="font-size:11px;color:#999;margin-top:2px">${c.role||'教練'}${c.phone?' · '+c.phone:''}</div>
        <div style="background:#f8f8f8;border-radius:8px;padding:6px 10px;margin-top:5px;display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:4px">
          <div><div style="font-size:10px;color:#999">本月出席人次</div><div style="font-size:14px;font-weight:600;color:#27500A">${monthPresent}</div></div>
          <div><div style="font-size:10px;color:#999">本月代課堂數</div><div style="font-size:14px;font-weight:600;color:#BA7517">${monthSubCount}</div></div>
          <div><div style="font-size:10px;color:#999">累計出席（含代課）</div><div style="font-size:13px;font-weight:500;color:#666">${totalPresent}</div></div>
          <div><div style="font-size:10px;color:#999">累計代課次數</div><div style="font-size:13px;font-weight:500;color:#BA7517">${totalSubCount}</div></div>
          <div><div style="font-size:10px;color:#999">負責班次</div><div style="font-size:13px;font-weight:500">${sessCount}</div></div>
        </div>
        ${c.note?`<div style="font-size:11px;color:#aaa;margin-top:4px">${c.note}</div>`:''}
      </div>
      <div style="display:flex;flex-direction:column;gap:5px">
        <button class="btn btn-outline" style="font-size:11px;padding:3px 9px" onclick="openEditCoach('${c.id}')">編輯</button>
        <button class="btn btn-red" style="font-size:11px;padding:3px 9px" onclick="deleteCoach('${c.id}')">刪除</button>
      </div>
    </div>`;
  }).join('');
}

// ── Report ①: Attendance with sub comparison & fee calc ──────────
function calcReportAtt() {
  const from  =document.getElementById('att-from')?.value||'';
  const to    =document.getElementById('att-to')?.value||'';
  const coachF=document.getElementById('att-coach')?.value||'';
  const sessF =document.getElementById('att-sess')?.value||'';

  // Build rows: each signinRec entry → effective coach
  const rows=[];
  Object.entries(signinRec).forEach(([key,rec])=>{
    const[sessId,date]=key.split('|');if(!date)return;
    if(from&&date<from)return;if(to&&date>to)return;
    const s=getSess(sessId);if(!s)return;
    const eff=rec._substituteCoach||s.coach;
    const isSub=!!rec._substituteCoach;
    const subFee=rec._substituteFee||0;
    const isExt=rec._substituteIsExternal||false;
    if(coachF&&eff!==coachF)return;
    if(sessF&&sessId!==sessF)return;
    const present=Object.entries(rec).filter(([k,v])=>!k.startsWith('_')&&v==='present').length;
    const leave  =Object.entries(rec).filter(([k,v])=>!k.startsWith('_')&&v==='leave').length;
    if(present+leave===0)return;
    rows.push({coach:eff,origCoach:s.coach,isSub,subFee,isExt,sessId,sessName:s.name+' '+s.day+' '+s.time,date,present,leave});
  });

  // Group by effectiveCoach
  const byCoach={};
  rows.forEach(r=>{
    if(!byCoach[r.coach])byCoach[r.coach]={coach:r.coach,sessions:{},totalPresent:0,totalLeave:0,subSessions:[],totalSubFee:0};
    const g=byCoach[r.coach];
    if(!g.sessions[r.sessId])g.sessions[r.sessId]={name:r.sessName,present:0,leave:0,classDates:[],subDates:[],subFeeTotal:0};
    const ss=g.sessions[r.sessId];
    ss.present+=r.present;ss.leave+=r.leave;ss.classDates.push(r.date);
    g.totalPresent+=r.present;g.totalLeave+=r.leave;
    if(r.isSub){ss.subDates.push(r.date);ss.subFeeTotal+=r.subFee*r.present;g.totalSubFee+=r.subFee*r.present;g.subSessions.push({date:r.date,sessName:r.sessName,present:r.present,subFee:r.subFee,isExt:r.isExt,origCoach:r.origCoach});}
  });

  const totalPresent=Object.values(byCoach).reduce((a,b)=>a+b.totalPresent,0);
  const totalLeave  =Object.values(byCoach).reduce((a,b)=>a+b.totalLeave,0);
  const totalSubFee =Object.values(byCoach).reduce((a,b)=>a+b.totalSubFee,0);

  if(!Object.keys(byCoach).length){document.getElementById('att-result').innerHTML='<div class="empty">此區間無出席簽到資料</div>';return;}

  // Stats
  const statsHTML=`<div class="report-stat-grid">
    <div class="report-stat"><div class="report-stat-val" style="color:#27500A">${totalPresent}</div><div class="report-stat-lbl">總出席人次</div></div>
    <div class="report-stat"><div class="report-stat-val" style="color:#378ADD">${totalLeave}</div><div class="report-stat-lbl">總請假人次</div></div>
    <div class="report-stat"><div class="report-stat-val">${Object.keys(byCoach).length}</div><div class="report-stat-lbl">實際授課教練</div></div>
    <div class="report-stat"><div class="report-stat-val" style="color:#BA7517">${totalSubFee?'NT$'+totalSubFee.toLocaleString():'NT$0'}</div><div class="report-stat-lbl">代課費合計</div></div>
  </div>`;

  // Main table
  const mainRows=Object.values(byCoach).flatMap(g=>{
    const co=coaches.find(c=>c.name===g.coach)||{color:'#888'};
    const sl=Object.values(g.sessions);
    return sl.map((ss,i)=>{
      const subNote=ss.subDates.length?`<span style="font-size:10px;color:#BA7517;background:#FAEEDA;padding:1px 5px;border-radius:5px;margin-left:4px">代課 ${ss.subDates.length} 堂</span>`:'';
      return`<tr>
        ${i===0?`<td rowspan="${sl.length}" style="font-weight:500;vertical-align:middle;white-space:nowrap">
          <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${co.color||'#888'};margin-right:4px"></span>${g.coach}
          ${g.subSessions.length?`<div style="font-size:10px;color:#BA7517">本期代課${g.subSessions.length}場</div>`:''}
        </td>`:''}
        <td>${ss.name}${subNote}</td>
        <td style="text-align:center">${ss.classDates.length}</td>
        <td style="text-align:center;font-weight:500;color:#27500A">${ss.present}</td>
        <td style="text-align:center;color:#378ADD">${ss.leave}</td>
        <td style="text-align:center">${ss.present+ss.leave}</td>
      </tr>`;
    });
  }).join('');

  // Sub comparison table
  const allSubRows=rows.filter(r=>r.isSub).sort((a,b)=>b.date.localeCompare(a.date));
  const subTableHTML=allSubRows.length?`
    <div style="margin-top:16px;font-size:13px;font-weight:500;margin-bottom:8px;display:flex;align-items:center;gap:8px">
      🔄 代課明細對照表
      <span style="font-size:11px;font-weight:400;color:#666">（原教練 vs 實際授課教練）</span>
    </div>
    <div style="overflow-x:auto"><table class="report-table">
      <thead><tr><th>日期</th><th>課程班次</th><th>原教練</th><th>代課教練</th><th>類型</th><th>出席人次</th><th>代課費/人</th><th>代課費小計</th></tr></thead>
      <tbody>${allSubRows.map(r=>`<tr>
        <td style="white-space:nowrap">${r.date}</td>
        <td>${r.sessName}</td>
        <td style="color:#999">${r.origCoach}</td>
        <td style="font-weight:500;color:#BA7517">${r.coach}</td>
        <td><span style="font-size:10px;padding:2px 6px;border-radius:6px;background:${r.isExt?'#FCEBEB':'#E6F1FB'};color:${r.isExt?'#501313':'#0C447C'}">${r.isExt?'外部':'系統教練'}</span></td>
        <td style="text-align:center;font-weight:500">${r.present}</td>
        <td style="text-align:center">${r.subFee?'NT$'+r.subFee.toLocaleString():'—'}</td>
        <td style="text-align:center;font-weight:500;color:#BA7517">${r.subFee?'NT$'+(r.subFee*r.present).toLocaleString():'—'}</td>
      </tr>`).join('')}
      <tr style="font-weight:600;background:#f0f0f0"><td colspan="5">代課合計</td><td style="text-align:center">${allSubRows.reduce((a,b)=>a+b.present,0)}</td><td></td><td style="text-align:center;color:#BA7517">${totalSubFee?'NT$'+totalSubFee.toLocaleString():'—'}</td></tr>
      </tbody>
    </table></div>`:'';

  document.getElementById('att-result').innerHTML=statsHTML+`
    <div style="font-size:11px;color:#666;margin-bottom:8px;padding:6px 10px;background:#f8f8f8;border-radius:8px">
      ℹ️ 下表以「實際授課教練」統計，代課日的出席人次歸入代課教練，不計原教練。
    </div>
    <div style="overflow-x:auto"><table class="report-table">
      <thead><tr><th>實際授課教練</th><th>課程班次</th><th>授課堂數</th><th>出席人次</th><th>請假人次</th><th>總計</th></tr></thead>
      <tbody>${mainRows}</tbody>
    </table></div>
    ${subTableHTML}`;
}
